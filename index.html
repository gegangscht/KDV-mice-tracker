<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MouseTracker — NKI Immunology</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #f8f8f7; --surface: #ffffff; --surface2: #f1f0eb;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #C0DD97;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
  --red: #A32D2D; --red-bg: #FCEBEB;
  --teal: #0F6E56; --purple: #534AB7;
  --radius: 8px; --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; }

/* ── AUTH ── */
#auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.auth-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem; width:340px; text-align:center; }
.auth-card h1 { font-size:20px; font-weight:500; margin-bottom:.25rem; }
.auth-card p { font-size:12px; color:var(--text2); margin-bottom:1.5rem; }
.auth-card input { width:100%; padding:9px 12px; border:0.5px solid var(--border2); border-radius:var(--radius); font-size:14px; margin-bottom:.75rem; font-family:var(--font); background:var(--surface); color:var(--text); }
.auth-card input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-bg); }
.auth-error { color:var(--red); font-size:11px; margin-bottom:.5rem; display:none; }

/* ── LAYOUT ── */
#app { display:none; height:100vh; display:flex; flex-direction:column; }
.topbar { background:var(--surface); border-bottom:0.5px solid var(--border); padding:0 1.25rem; height:48px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.topbar-title { font-size:14px; font-weight:500; }
.topbar-sub { font-size:10px; color:var(--text2); }
.body { display:flex; flex:1; overflow:hidden; }
.sidebar { width:200px; min-width:200px; background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; padding:.5rem 0; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.main-header { background:var(--surface); border-bottom:0.5px solid var(--border); padding:0 1.25rem; height:48px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:.5rem; flex-wrap:wrap; }
.main-title { font-size:14px; font-weight:500; }
.content { flex:1; overflow-y:auto; padding:.875rem 1.25rem; }

/* ── SIDEBAR ── */
.nav-section { padding:.45rem 1rem .15rem; font-size:9px; font-weight:500; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; }
.nav-item { display:flex; align-items:center; gap:7px; padding:6px 1rem; font-size:12px; color:var(--text2); cursor:pointer; border-left:2px solid transparent; transition:all .1s; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { color:var(--blue); border-left-color:var(--blue); background:var(--blue-bg); font-weight:500; }
.nav-item i { font-size:14px; }
.nav-exp { display:flex; align-items:center; gap:6px; padding:4px 1rem 4px 1.5rem; font-size:11px; color:var(--text2); cursor:pointer; }
.nav-exp:hover { color:var(--text); }
.edot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.nav-divider { height:.5px; background:var(--border); margin:.4rem 0; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; font-size:11px; border-radius:var(--radius); cursor:pointer; border:0.5px solid var(--border2); background:var(--surface); color:var(--text); font-family:var(--font); transition:background .1s; }
.btn:hover { background:var(--surface2); }
.btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover { background:var(--blue-text); }
.btn-green { background:var(--green-bg); color:var(--green); border-color:var(--green-border); }
.btn-green:hover { background:var(--green-border); }
.btn-xs { padding:2px 7px; font-size:10px; }
.btn-icon { padding:3px 5px; }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; padding:1px 6px; border-radius:10px; font-size:10px; font-weight:500; }
.badge-green { background:var(--green-bg); color:var(--green); }
.badge-amber { background:var(--amber-bg); color:var(--amber); }
.badge-red { background:var(--red-bg); color:var(--red); }
.badge-blue { background:var(--blue-bg); color:var(--blue); }
.badge-gray { background:var(--surface2); color:var(--text2); }
.badge-purple { background:#EEEDFE; color:var(--purple); }

/* ── CARDS ── */
.card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:.75rem 1rem; margin-bottom:.75rem; }
.metric-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:.75rem; }
.metric-card { background:var(--surface2); border-radius:var(--radius); padding:.5rem .75rem; }
.metric-label { font-size:10px; color:var(--text2); margin-bottom:2px; }
.metric-value { font-size:20px; font-weight:500; }

/* ── DIVIDER ── */
hr.div { border:none; border-top:0.5px solid var(--border); margin:.625rem 0; }

/* ── TABS ── */
.tabs { display:flex; border-bottom:0.5px solid var(--border); margin-bottom:.75rem; }
.tab { padding:5px 12px; font-size:11px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-.5px; }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:500; }
.tab:hover { color:var(--text); }

/* ── ALERT ── */
.alert { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:var(--radius); background:var(--amber-bg); border:0.5px solid var(--amber-border); margin-bottom:5px; font-size:11px; color:#633806; }

/* ── TASK ROWS ── */
.task-section-header { display:flex; align-items:center; gap:6px; margin:.75rem 0 .3rem; }
.task-section-title { font-size:10px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; }
.task-count { font-size:10px; background:var(--surface2); color:var(--text2); padding:1px 5px; border-radius:8px; }
.task-cols { display:grid; grid-template-columns:85px 85px 1fr 90px 55px 100px; gap:6px; }
.task-header { font-size:9px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; padding:0 9px 3px; }
.task-row { padding:6px 9px; border-radius:var(--radius); border:0.5px solid var(--border); background:var(--surface); margin-bottom:3px; cursor:default; }
.task-row:hover { background:var(--surface2); }
.note-pill { background:var(--amber-bg); color:var(--amber); border-radius:3px; padding:0 4px; font-size:9px; margin-left:3px; }

/* ── INLINE LOG ── */
.inline-log { background:var(--surface2); border:0.5px solid var(--border2); border-radius:var(--radius); padding:8px 10px; margin-top:4px; }
.il-row { display:flex; align-items:flex-end; gap:6px; flex-wrap:wrap; }
.il-group { display:flex; flex-direction:column; gap:2px; }
.il-label { font-size:9px; color:var(--text3); }
.il-input { padding:4px 7px; font-size:12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); font-family:var(--font); }
.il-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-bg); }
.site-row { display:flex; align-items:center; gap:4px; margin-bottom:4px; }
.site-input { padding:3px 6px; font-size:11px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); font-family:var(--font); }
.site-input:focus { outline:none; border-color:var(--blue); }

/* ── TABLES ── */
.mtable { width:100%; font-size:11px; border-collapse:collapse; table-layout:fixed; }
.mtable th { text-align:left; padding:4px 6px; font-size:9px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; border-bottom:0.5px solid var(--border); white-space:nowrap; overflow:hidden; }
.mtable td { padding:5px 6px; border-bottom:0.5px solid var(--border); vertical-align:middle; overflow:hidden; text-overflow:ellipsis; }
.mtable tr:last-child td { border-bottom:none; }
.mtable tr:hover td { background:var(--surface2); }
.mono { font-family:var(--mono); font-size:10px; }
.hist-table { width:100%; font-size:10px; border-collapse:collapse; }
.hist-table th { text-align:left; padding:3px 5px; font-size:9px; color:var(--text3); border-bottom:0.5px solid var(--border); }
.hist-table td { padding:3px 5px; border-bottom:0.5px solid var(--border); }
.hist-table tr:last-child td { border-bottom:none; }

/* ── WEEK VIEW ── */
.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:.75rem; }
.week-day { border:0.5px solid var(--border); border-radius:var(--radius); background:var(--surface); min-height:100px; }
.week-day-header { padding:4px 6px; border-bottom:0.5px solid var(--border); font-size:10px; font-weight:500; }
.week-day-header.today { background:var(--blue-bg); color:var(--blue); }
.week-task { margin:2px 3px; padding:2px 5px; border-radius:3px; font-size:9px; cursor:pointer; }
.week-task:hover { opacity:.8; }
.wt-measure { background:var(--green-bg); color:var(--green); }
.wt-treatment { background:var(--blue-bg); color:var(--blue); }
.wt-blood { background:var(--red-bg); color:var(--red); }
.wt-ivis { background:#EEEDFE; color:var(--purple); }
.wt-custom { background:var(--amber-bg); color:var(--amber); }

/* ── FORMS ── */
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
.form-full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:3px; }
.form-label { font-size:10px; font-weight:500; color:var(--text2); }
.form-input { padding:6px 9px; font-size:12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); font-family:var(--font); }
.form-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-bg); }
.form-select { padding:6px 9px; font-size:12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); font-family:var(--font); }
.form-select:focus { outline:none; border-color:var(--blue); }
.form-textarea { padding:6px 9px; font-size:12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--text); font-family:var(--font); resize:vertical; }

/* ── GROUP & EVENT BLOCKS ── */
.group-block { border:0.5px solid var(--border); border-radius:var(--radius); padding:.625rem .75rem; margin-bottom:.625rem; }
.event-block { background:var(--surface2); border-radius:var(--radius); padding:.4rem .625rem; margin-bottom:.4rem; border:0.5px solid var(--border); }
.day-btn { display:inline-flex; align-items:center; justify-content:center; width:30px; height:26px; border-radius:var(--radius); border:0.5px solid var(--border2); font-size:10px; cursor:pointer; color:var(--text2); margin-right:2px; }
.day-btn.selected { background:var(--blue); color:#fff; border-color:var(--blue); }
.day-btn:hover:not(.selected) { background:var(--surface2); }
.evt-chip { padding:2px 7px; border-radius:8px; font-size:10px; cursor:pointer; border:0.5px solid var(--border2); color:var(--text2); margin-right:3px; margin-bottom:2px; display:inline-block; }
.evt-chip.sel-measure { background:var(--green-bg); color:var(--green); border-color:var(--green-border); }
.evt-chip.sel-treatment { background:var(--blue-bg); color:var(--blue); border-color:#B5D4F4; }
.evt-chip.sel-blood { background:var(--red-bg); color:var(--red); border-color:#F7C1C1; }
.evt-chip.sel-ivis { background:#EEEDFE; color:var(--purple); border-color:#CECBF6; }
.evt-chip.sel-custom { background:var(--amber-bg); color:var(--amber); border-color:var(--amber-border); }

/* ── MODAL ── */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; z-index:500; }
.modal { background:var(--surface); border-radius:var(--radius-lg); border:0.5px solid var(--border); width:420px; max-height:85vh; overflow-y:auto; padding:1.25rem; }
.modal-title { font-size:13px; font-weight:500; margin-bottom:.875rem; }
.modal-footer { display:flex; gap:7px; justify-content:flex-end; margin-top:.875rem; padding-top:.875rem; border-top:0.5px solid var(--border); }

/* ── PLOT TOGGLES ── */
.plot-toggle { display:flex; gap:3px; }
.pt-btn { padding:2px 8px; font-size:10px; border-radius:var(--radius); cursor:pointer; border:0.5px solid var(--border2); color:var(--text2); background:var(--surface); }
.pt-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.sort-btn { padding:3px 7px; font-size:10px; border-radius:var(--radius); cursor:pointer; border:0.5px solid var(--border2); color:var(--text2); background:var(--surface); }
.sort-btn.active { background:var(--blue-bg); color:var(--blue); border-color:#B5D4F4; }

/* ── MISC ── */
.chart-wrap { position:relative; width:100%; }
.empty { text-align:center; padding:2.5rem; color:var(--text3); font-size:12px; }
.empty i { font-size:28px; display:block; margin-bottom:.5rem; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-overlay { display:flex; align-items:center; justify-content:center; padding:3rem; gap:.5rem; color:var(--text2); font-size:12px; }
.burden-badge { font-family:var(--mono); font-size:10px; background:var(--surface2); border-radius:3px; padding:1px 5px; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>MouseTracker</h1>
    <p>NKI Immunology Lab</p>
    <div id="auth-error" class="auth-error">Incorrect password</div>
    <input type="password" id="auth-password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:9px" onclick="checkAuth()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div>
      <div class="topbar-title">MouseTracker</div>
      <div class="topbar-sub" id="topbar-date"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <div id="main-header-acts"></div>
      <button class="btn btn-xs" onclick="signOut()" title="Sign out"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="nav-section">Technician</div>
      <div class="nav-item active" id="nav-daily" onclick="navigate('daily')"><i class="ti ti-calendar-today"></i> Daily tasks</div>
      <div class="nav-item" id="nav-week" onclick="navigate('week')"><i class="ti ti-calendar-week"></i> Week view</div>
      <div class="nav-divider"></div>
      <div class="nav-section">Experiments</div>
      <div class="nav-item" id="nav-exps" onclick="navigate('exps')"><i class="ti ti-flask"></i> All experiments</div>
      <div class="nav-item" id="nav-new" onclick="navigate('new')"><i class="ti ti-plus"></i> New experiment</div>
      <div class="nav-divider"></div>
      <div class="nav-section">Active</div>
      <div id="exp-nav"></div>
    </div>
    <div class="main">
      <div class="main-header">
        <div class="main-title" id="page-title">Daily tasks</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap" id="page-actions"></div>
      </div>
      <div class="content" id="content">
        <div class="loading-overlay"><div class="spinner"></div> Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ppzyyocyfcoiqeehnohn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwenl5b2N5ZmNvaXFlZWhub2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTQ5MzcsImV4cCI6MjA5NTc5MDkzN30.UGYk2_WF7Kf_tEn6iZ_tfD9KuTCp7RQ_Rjrdkol0v_c';
const PASSWORD = 'NKI2026'; // Change this to your preferred password
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TODAY = new Date();
const TODAY_ISO = TODAY.toISOString().slice(0,10);
const TODAY_DOW = TODAY.getDay();
const TODAY_LBL = TODAY.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const COLS = ['#185FA5','#0F6E56','#993C1D','#534AB7','#993556','#854F0B'];
const TYPE_LABEL = {measure:'Measurements',treatment:'Treatments',blood:'Blood draws',ivis:'IVIS / imaging',custom:'Ad hoc'};
const TYPE_ICON = {measure:'ti-ruler-2',treatment:'ti-syringe',blood:'ti-droplet',ivis:'ti-camera',custom:'ti-clipboard-list'};

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  view: 'daily', curExp: null, expTab: 'mice',
  sortBy: 'type', weekOffset: 0, plotMode: 'both',
  showHist: {},
  // cached data
  experiments: [], mice: {}, measurements: {}, groups: {}, events: {},
  adhoc: [], logOpen: {}
};

// ── AUTH ──────────────────────────────────────────────────────────────────────
function checkAuth() {
  const pw = document.getElementById('auth-password').value;
  if (pw === PASSWORD) {
    sessionStorage.setItem('mt_auth', '1');
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    document.getElementById('topbar-date').textContent = TODAY_LBL;
    init();
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
}
function signOut() {
  sessionStorage.removeItem('mt_auth');
  location.reload();
}
if (sessionStorage.getItem('mt_auth') === '1') {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('topbar-date').textContent = TODAY_LBL;
}

// ── DB HELPERS ────────────────────────────────────────────────────────────────
async function dbLoad() {
  const [exps, groups, events, mice, adhoc] = await Promise.all([
    sb.from('experiments').select('*').order('started', {ascending:false}),
    sb.from('experiment_groups').select('*').order('sort_order'),
    sb.from('scheduled_events').select('*').order('sort_order'),
    sb.from('mice').select('*').order('enrolled'),
    sb.from('adhoc_tasks').select('*').order('task_date'),
  ]);
  S.experiments = exps.data || [];
  S.groups = {};
  (groups.data||[]).forEach(g => {
    if (!S.groups[g.experiment_id]) S.groups[g.experiment_id] = [];
    S.groups[g.experiment_id].push(g);
  });
  S.events = {};
  (events.data||[]).forEach(ev => {
    if (!S.events[ev.group_id]) S.events[ev.group_id] = [];
    S.events[ev.group_id].push(ev);
  });
  S.mice = {};
  (mice.data||[]).forEach(m => {
    if (!S.mice[m.experiment_id]) S.mice[m.experiment_id] = [];
    S.mice[m.experiment_id].push(m);
  });
  S.adhoc = adhoc.data || [];
}

async function loadMeasurements(expId) {
  const miceInExp = (S.mice[expId] || []).map(m => m.id);
  if (!miceInExp.length) { S.measurements[expId] = {}; return; }
  const { data: msData } = await sb.from('measurements')
    .select('*, tumor_sites(*)')
    .in('mouse_id', miceInExp)
    .order('measured_at');
  S.measurements[expId] = {};
  (msData||[]).forEach(ms => {
    if (!S.measurements[expId][ms.mouse_id]) S.measurements[expId][ms.mouse_id] = [];
    S.measurements[expId][ms.mouse_id].push(ms);
  });
}

// ── MEASUREMENT HELPERS ───────────────────────────────────────────────────────
function parseSize(s) {
  if (!s) return null;
  const m = s.toString().match(/(\d+\.?\d*)\s*[x×X]\s*(\d+\.?\d*)/);
  return m ? {v1: parseFloat(m[1]), v2: parseFloat(m[2])} : null;
}
function siteArea(site) { return (site.dim1 || 0) * (site.dim2 || 0); }
function totalBurden(sites) { return (sites||[]).reduce((s,t) => s + siteArea(t), 0); }
function burdenShort(sites) {
  if (!sites || !sites.length) return '—';
  const total = Math.round(totalBurden(sites));
  if (sites.length === 1) {
    const s = sites[0];
    return s.dim1 && s.dim2 ? `${s.dim1}×${s.dim2}` : '—';
  }
  return `${total}mm² (${sites.length} sites)`;
}
function burdenFull(sites) {
  if (!sites || !sites.length) return '—';
  return sites.map(s => (s.location ? s.location+' ' : '') + (s.dim1&&s.dim2?`${s.dim1}×${s.dim2}`:'?')).join(' + ')
    + (sites.length > 1 ? ` = ${Math.round(totalBurden(sites))}mm²` : '');
}
function lastMeasurement(mouseId, expId) {
  const ms = (S.measurements[expId] || {})[mouseId] || [];
  const valid = ms.filter(x => x.tumor_sites && x.tumor_sites.some(s => s.dim1));
  return valid.length ? valid[valid.length-1] : null;
}
function nearEndpoint(mouseId, expId) {
  const last = lastMeasurement(mouseId, expId);
  if (!last) return false;
  return totalBurden(last.tumor_sites) >= 81;
}
function daysInTx(m) {
  if (!m.tx_start) return null;
  return Math.round((new Date(TODAY_ISO) - new Date(m.tx_start)) / 86400000);
}
function addDays(iso, n) {
  const d = new Date(iso); d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function weekMondayISO(offsetWeeks) {
  const d = new Date(TODAY);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offsetWeeks * 7);
  return d.toISOString().slice(0,10);
}

// ── TASK GENERATOR ────────────────────────────────────────────────────────────
function getTasksForDate(iso) {
  const d = new Date(iso); const dow = d.getDay();
  const tasks = [];
  S.experiments.filter(e => e.status === 'active').forEach(exp => {
    const mice = (S.mice[exp.id] || []).filter(m => m.status === 'active');
    const groups = S.groups[exp.id] || [];
    mice.forEach(m => {
      const g = groups.find(g => g.id === m.group_id);
      if (!g) return;
      const groupEvents = S.events[g.id] || [];
      const last = lastMeasurement(m.id, exp.id);
      const txD = m.tx_start ? new Date(m.tx_start) : null;
      const enD = m.enrolled ? new Date(m.enrolled) : null;
      const tgtD = new Date(iso);

      groupEvents.forEach(ev => {
        // Measurements on fixed days
        if (ev.type === 'measure' && ev.schedule_type === 'fixed-days') {
          const days = ev.schedule_days || [];
          if (days.includes(dow) && enD && tgtD >= enD) {
            tasks.push({type:'measure', mouseId:m.id, expId:exp.id, expName:exp.name,
              researcher:exp.researcher, group:g.name, groupColor:g.color,
              label:ev.label, lastBurden:last?burdenShort(last.tumor_sites):'—',
              lastNote:last?.note||'', dayInTx:txD?Math.round((tgtD-txD)/86400000):null,
              m, exp, g, ev, date:iso, taskId:`meas-${m.id}-${iso}`});
          }
        }
        // Treatments on fixed days
        if (ev.type === 'treatment' && ev.schedule_type === 'fixed-days') {
          let triggered = false;
          if (ev.trigger_type === 'size' && last) {
            const b = totalBurden(last.tumor_sites);
            const thr = parseSize(ev.trigger_value || '5x5');
            if (thr && b >= thr.v1 * thr.v2) triggered = true;
          } else if (['age','day-after-tx','enrollment'].includes(ev.trigger_type)) {
            triggered = txD && tgtD >= txD;
          }
          const days = ev.schedule_days || [];
          if (triggered && days.includes(dow)) {
            const nDone = ((m.completed_events||[])).filter(e => e === ev.label).length;
            if (!ev.max_doses || nDone < ev.max_doses) {
              tasks.push({type:'treatment', mouseId:m.id, expId:exp.id, expName:exp.name,
                researcher:exp.researcher, group:g.name, groupColor:g.color,
                label:ev.label, drug:ev.drug, dose:ev.dose, route:ev.route,
                weight:m.weight, dayInTx:txD?Math.round((tgtD-txD)/86400000):null,
                m, exp, g, ev, date:iso, taskId:`tx-${m.id}-${ev.label}-${iso}`});
            }
          }
        }
        // Once events (blood, ivis)
        if ((ev.type === 'blood' || ev.type === 'ivis') && ev.schedule_type === 'once') {
          let tgt = null;
          if (ev.trigger_type === 'day-after-tx' && txD) tgt = addDays(m.tx_start, ev.day_offset || 0);
          else if (ev.trigger_type === 'endpoint' && nearEndpoint(m.id, exp.id)) tgt = iso;
          const resched = S.adhoc.find(t => t.original_task_key === `${ev.label}-${m.id}` && !t.done);
          if (resched) tgt = resched.task_date;
          if (tgt === iso && !(m.completed_events||[]).includes(ev.label)) {
            tasks.push({type:ev.type, mouseId:m.id, expId:exp.id, expName:exp.name,
              researcher:exp.researcher, group:g.name, groupColor:g.color,
              label:ev.label, dayInTx:txD?Math.round((tgtD-txD)/86400000):null,
              m, exp, g, ev, date:iso, taskId:`${ev.type}-${m.id}-${ev.label}-${iso}`});
          }
        }
        // Interval schedule
        if (ev.schedule_type === 'interval' && ev.interval_days && txD && tgtD >= txD) {
          const daysSince = Math.round((tgtD - txD) / 86400000);
          if (daysSince > 0 && daysSince % ev.interval_days === 0) {
            const nDone = ((m.completed_events||[])).filter(e => e === ev.label).length;
            if (!ev.max_doses || nDone < ev.max_doses) {
              tasks.push({type:ev.type||'treatment', mouseId:m.id, expId:exp.id, expName:exp.name,
                researcher:exp.researcher, group:g.name, groupColor:g.color,
                label:ev.label, drug:ev.drug||'', dose:ev.dose||'',
                dayInTx:daysSince, m, exp, g, ev, date:iso,
                taskId:`int-${m.id}-${ev.label}-${iso}`});
            }
          }
        }
      });
    });
    // Ad hoc tasks for this date
    S.adhoc.filter(t => t.task_date === iso && !t.original_task_key && t.experiment_id === exp.id).forEach(t => {
      tasks.push({type:'custom', mouseId:t.mouse_id||'', expId:exp.id, expName:exp.name,
        researcher:exp.researcher, label:t.description, note:t.note, done:t.done,
        adHocId:t.id, date:iso, taskId:`adhoc-${t.id}`});
    });
  });
  // Global ad hoc (no experiment)
  S.adhoc.filter(t => t.task_date === iso && !t.original_task_key && !t.experiment_id).forEach(t => {
    tasks.push({type:'custom', mouseId:t.mouse_id||'', expId:'', expName:'', label:t.description,
      note:t.note, done:t.done, adHocId:t.id, date:iso, taskId:`adhoc-${t.id}`});
  });
  return tasks;
}

function sortTasks(tasks) {
  if (S.sortBy === 'exp') return [...tasks].sort((a,b) => (a.expId||'').localeCompare(b.expId||'') || (a.type||'').localeCompare(b.type||''));
  const order = {measure:0,treatment:1,blood:2,ivis:3,custom:4};
  return [...tasks].sort((a,b) => (order[a.type]??9)-(order[b.type]??9) || (a.expId||'').localeCompare(b.expId||''));
}

// ── INLINE LOG ────────────────────────────────────────────────────────────────
let logOrder = [];

function logHTML(expId, mouseId, editIdx) {
  const exp = S.experiments.find(e => e.id === expId);
  const m = (S.mice[expId]||[]).find(x => x.id === mouseId);
  const isEdit = editIdx >= 0;
  const msList = (S.measurements[expId]||{})[mouseId] || [];
  const entry = isEdit ? msList[editIdx] : null;
  const defDate = entry ? entry.measured_at : TODAY_ISO;
  const defNote = entry ? (entry.note||'') : '';
  const defW = m?.weight || '';
  const multiTumor = exp?.multi_tumor || false;
  const defSites = entry?.tumor_sites?.length ? entry.tumor_sites : [{location:'',dim1:'',dim2:''}];

  let siteHTML = '';
  if (multiTumor) {
    siteHTML = `<div class="il-group"><div class="il-label">Sites (loc + size)</div><div id="site-rows-${mouseId}">`;
    defSites.forEach((site, si) => {
      siteHTML += `<div class="site-row" id="siterow-${mouseId}-${si}">
        <input class="site-input" id="il-loc-${mouseId}-${si}" value="${site.location||''}" style="width:38px" placeholder="4R">
        <input class="site-input" id="il-sz-${mouseId}-${si}" value="${site.dim1&&site.dim2?site.dim1+'×'+site.dim2:''}" style="width:70px" placeholder="7×8" onkeydown="ilSiteKey(event,'${expId}','${mouseId}',${editIdx},${si})">
        ${si>0?`<button class="btn btn-xs btn-icon" onclick="removeSite('${mouseId}',${si})"><i class="ti ti-x"></i></button>`:''}
      </div>`;
    });
    siteHTML += `</div><button class="btn btn-xs" style="margin-bottom:5px" onclick="addSite('${mouseId}')"><i class="ti ti-plus"></i> Add site</button></div>`;
  } else {
    siteHTML = `<div class="il-group"><div class="il-label">Size (e.g. 7×8)</div>
      <input class="il-input" id="il-sz-${mouseId}-0" value="${defSites[0]?.dim1&&defSites[0]?.dim2?defSites[0].dim1+'×'+defSites[0].dim2:''}" style="width:85px" placeholder="7×8" onkeydown="ilKey(event,'${expId}','${mouseId}',${editIdx})">
    </div>`;
  }

  return `<div class="inline-log" id="il-${mouseId}">
    <div class="il-row">
      <div class="il-group"><div class="il-label">Date</div><input class="il-input" id="il-d-${mouseId}" type="date" value="${defDate}" style="width:130px"></div>
      ${siteHTML}
      <div class="il-group"><div class="il-label">Weight (g)</div><input class="il-input" id="il-w-${mouseId}" value="${defW}" style="width:62px" placeholder="24.5" onkeydown="ilKey(event,'${expId}','${mouseId}',${editIdx})"></div>
      <div class="il-group" style="flex:1;min-width:110px"><div class="il-label">Note</div><input class="il-input" id="il-n-${mouseId}" value="${defNote}" style="width:100%" placeholder="ulceration, 4R..." onkeydown="ilKey(event,'${expId}','${mouseId}',${editIdx})"></div>
      ${!isEdit?`<div class="il-group"><div class="il-label">Status</div><select class="il-input" id="il-st-${mouseId}" style="padding:3px 4px;font-size:10px">
        <option value="">Active</option>
        <option value="endpoint">Sacrifice — endpoint</option>
        <option value="humane">Sacrifice — humane EP</option>
        <option value="early">Sacrifice — early</option>
        <option value="dead">Found dead</option>
      </select></div>`:''}
      <div class="il-group"><div class="il-label">&nbsp;</div>
        <button class="btn btn-green btn-xs" onclick="submitLog('${expId}','${mouseId}',${editIdx})"><i class="ti ti-check"></i> ${isEdit?'Update':'Save'}</button>
      </div>
    </div>
    <div id="il-kdv-${mouseId}" style="display:none;margin-top:6px">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <span class="il-label" style="align-self:center;white-space:nowrap">KDV# (if formalin):</span>
        <input class="il-input" id="il-kdv-in-${mouseId}" style="width:130px" placeholder="26KDV123" onkeydown="if(event.key==='Enter')saveKDV('${expId}','${mouseId}')">
        <button class="btn btn-primary btn-xs" onclick="saveKDV('${expId}','${mouseId}')">Save KDV</button>
      </div>
    </div>
  </div>`;
}

function addSite(mouseId) {
  const cont = document.getElementById(`site-rows-${mouseId}`);
  if (!cont) return;
  const si = cont.children.length;
  const div = document.createElement('div');
  div.className = 'site-row'; div.id = `siterow-${mouseId}-${si}`;
  div.innerHTML = `<input class="site-input" id="il-loc-${mouseId}-${si}" style="width:38px" placeholder="3L">
    <input class="site-input" id="il-sz-${mouseId}-${si}" style="width:70px" placeholder="5×6">
    <button class="btn btn-xs btn-icon" onclick="removeSite('${mouseId}',${si})"><i class="ti ti-x"></i></button>`;
  cont.appendChild(div);
  document.getElementById(`il-loc-${mouseId}-${si}`)?.focus();
}
function removeSite(mouseId, si) {
  document.getElementById(`siterow-${mouseId}-${si}`)?.remove();
}
function getSites(mouseId) {
  const sites = []; let si = 0;
  while (true) {
    const szEl = document.getElementById(`il-sz-${mouseId}-${si}`);
    if (!szEl) break;
    const sz = szEl.value.trim();
    const loc = (document.getElementById(`il-loc-${mouseId}-${si}`)?.value||'').trim();
    if (sz) {
      const p = parseSize(sz);
      if (p) sites.push({location:loc, dim1:p.v1, dim2:p.v2, sort_order:si});
    }
    si++;
  }
  return sites;
}
function ilKey(e, expId, mouseId, editIdx) { if (e.key==='Enter') { e.preventDefault(); submitLog(expId, mouseId, editIdx); } }
function ilSiteKey(e, expId, mouseId, editIdx, si) {
  if (e.key==='Enter') {
    e.preventDefault();
    const next = document.getElementById(`il-loc-${mouseId}-${si+1}`);
    if (next) next.focus(); else submitLog(expId, mouseId, editIdx);
  }
}

function openLogDaily(expId, mouseId) {
  const cont = document.getElementById(`il-cont-daily-${mouseId}`);
  if (!cont) return;
  if (cont.style.display === 'block') { cont.style.display = 'none'; cont.innerHTML = ''; return; }
  cont.style.display = 'block';
  cont.innerHTML = logHTML(expId, mouseId, -1);
  setTimeout(() => { document.getElementById(`il-sz-${mouseId}-0`)?.focus(); }, 30);
}

function openLogExp(expId, mouseId, editIdx = -1) {
  const existing = document.getElementById(`il-tr-${mouseId}`);
  if (existing) { const cur = parseInt(existing.dataset.editIdx||'-1'); existing.remove(); if (cur===editIdx) return; }
  const row = document.getElementById(`mrow-${mouseId}`);
  if (!row) return;
  const tr = document.createElement('tr'); tr.id = `il-tr-${mouseId}`; tr.dataset.editIdx = editIdx;
  const td = document.createElement('td'); td.colSpan = 20;
  td.style.cssText = 'padding:0 6px 5px;background:var(--surface2)';
  td.innerHTML = logHTML(expId, mouseId, editIdx);
  tr.appendChild(td); row.after(tr);
  setTimeout(() => { document.getElementById(`il-sz-${mouseId}-0`)?.focus(); }, 30);
}

async function submitLog(expId, mouseId, editIdx) {
  const dateVal = document.getElementById(`il-d-${mouseId}`)?.value || TODAY_ISO;
  const wStr = (document.getElementById(`il-w-${mouseId}`)?.value || '').trim();
  const note = (document.getElementById(`il-n-${mouseId}`)?.value || '').trim();
  const status = document.getElementById(`il-st-${mouseId}`)?.value || '';
  const exp = S.experiments.find(e => e.id === expId);
  const sites = getSites(mouseId);

  if (!sites.length && !note) { alert('Enter at least one measurement.'); return; }

  const btn = document.querySelector(`#il-${mouseId} .btn-green`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:12px;height:12px"></div>'; }

  try {
    if (editIdx >= 0) {
      // Update existing measurement
      const msList = (S.measurements[expId]||{})[mouseId] || [];
      const ms = msList[editIdx];
      if (ms) {
        await sb.from('measurements').update({measured_at:dateVal, note, edited_at:TODAY_ISO}).eq('id', ms.id);
        await sb.from('tumor_sites').delete().eq('measurement_id', ms.id);
        if (sites.length) {
          await sb.from('tumor_sites').insert(sites.map(s => ({...s, measurement_id:ms.id})));
        }
      }
    } else {
      // New measurement
      const {data:msData} = await sb.from('measurements').insert({mouse_id:mouseId, experiment_id:expId, measured_at:dateVal, note}).select().single();
      if (msData && sites.length) {
        await sb.from('tumor_sites').insert(sites.map(s => ({...s, measurement_id:msData.id})));
      }
    }

    // Update weight
    if (wStr) {
      const w = parseFloat(wStr);
      if (!isNaN(w)) await sb.from('mice').update({weight:w}).eq('id', mouseId);
    }

    // Handle sacrifice
    if (status && editIdx < 0) {
      await sb.from('mice').update({status:'sacrificed', cause:status, sac_date:dateVal}).eq('id', mouseId);
      const kdvDiv = document.getElementById(`il-kdv-${mouseId}`);
      const il = document.getElementById(`il-${mouseId}`);
      if (il && kdvDiv) {
        const row = il.querySelector('.il-row');
        if (row) row.innerHTML = `<div style="font-size:11px;color:var(--green);padding:4px 0"><i class="ti ti-check"></i> Saved. Mouse marked: ${status}. Add KDV if applicable.</div>`;
        kdvDiv.style.display = 'block';
      }
      await loadData(expId);
      return;
    }

    // Advance to next in daily view
    if (editIdx < 0 && S.view === 'daily') {
      const idx = logOrder.indexOf(mouseId);
      if (idx >= 0 && idx < logOrder.length - 1) {
        const nextId = logOrder[idx+1];
        const nextExpId = S.experiments.find(e => (S.mice[e.id]||[]).find(mm => mm.id===nextId))?.id || expId;
        const curCont = document.getElementById(`il-cont-daily-${mouseId}`);
        if (curCont) curCont.innerHTML = `<div style="padding:3px 9px 6px;font-size:11px;color:var(--green)"><i class="ti ti-check"></i> Saved${sites[0]?' — '+sites[0].dim1+'×'+sites[0].dim2:''}</div>`;
        await loadData(expId);
        openLogDaily(nextExpId, nextId);
        return;
      }
    }

    await loadData(expId);
    if (S.view === 'daily') renderDaily();
    else renderExperiment(expId);
  } catch(err) {
    alert('Error saving: ' + err.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Save'; }
  }
}

async function saveKDV(expId, mouseId) {
  const kdv = (document.getElementById(`il-kdv-in-${mouseId}`)?.value||'').trim();
  if (kdv) await sb.from('mice').update({kdv}).eq('id', mouseId);
  await loadData(expId);
  if (S.view === 'daily') renderDaily(); else renderExperiment(expId);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData(expId) {
  await dbLoad();
  if (expId) await loadMeasurements(expId);
}

async function init() {
  await dbLoad();
  // Load measurements for all active experiments
  await Promise.all(S.experiments.filter(e=>e.status==='active').map(e => loadMeasurements(e.id)));
  buildExpNav();
  renderDaily();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function buildExpNav() {
  document.getElementById('exp-nav').innerHTML = S.experiments
    .filter(e => e.status === 'active')
    .map(e => `<div class="nav-exp" onclick="navigate('exp-${e.id}')"><div class="edot" style="background:${e.color}"></div>${e.id}</div>`)
    .join('');
}

function navigate(view) {
  S.view = view; S.curExp = null; S.expTab = 'mice';
  ['daily','week','exps','new'].forEach(n => {
    const el = document.getElementById('nav-'+n);
    if (el) el.classList.toggle('active', n === view);
  });
  if (view === 'daily') renderDaily();
  else if (view === 'week') renderWeek();
  else if (view === 'exps') renderExps();
  else if (view === 'new') renderNew();
  else if (view.startsWith('exp-')) {
    ['daily','week','exps','new'].forEach(n => document.getElementById('nav-'+n)?.classList.remove('active'));
    S.curExp = view.replace('exp-','');
    renderExperiment(S.curExp);
  }
}

// ── DAILY VIEW ────────────────────────────────────────────────────────────────
function renderDaily() {
  document.getElementById('page-title').textContent = 'Daily tasks';
  document.getElementById('page-actions').innerHTML = `
    <div style="display:flex;gap:3px">
      <button class="sort-btn ${S.sortBy==='type'?'active':''}" onclick="S.sortBy='type';renderDaily()">Type</button>
      <button class="sort-btn ${S.sortBy==='exp'?'active':''}" onclick="S.sortBy='exp';renderDaily()">WP</button>
    </div>
    <button class="btn btn-xs" onclick="showAddTask()"><i class="ti ti-plus"></i> Add task</button>
    <button class="btn btn-xs" onclick="window.print()"><i class="ti ti-printer"></i> Print</button>`;

  const raw = getTasksForDate(TODAY_ISO);
  const tasks = sortTasks(raw);
  logOrder = tasks.filter(t => t.type==='measure').map(t => t.mouseId);

  const activeMice = S.experiments.reduce((s,e) => s + (S.mice[e.id]||[]).filter(m=>m.status==='active').length, 0);
  let html = `
  <div class="metric-grid">
    <div class="metric-card"><div class="metric-label">Active mice</div><div class="metric-value">${activeMice}</div></div>
    <div class="metric-card"><div class="metric-label">Measurements</div><div class="metric-value">${tasks.filter(t=>t.type==='measure').length}</div></div>
    <div class="metric-card"><div class="metric-label">Treatments</div><div class="metric-value">${tasks.filter(t=>t.type==='treatment').length}</div></div>
    <div class="metric-card"><div class="metric-label">Blood / IVIS</div><div class="metric-value">${tasks.filter(t=>t.type==='blood'||t.type==='ivis').length}</div></div>
  </div>`;

  // Endpoint alerts
  const epSeen = new Set();
  raw.forEach(t => {
    if (t.m && nearEndpoint(t.m.id, t.expId) && !epSeen.has(t.mouseId)) {
      epSeen.add(t.mouseId);
      const last = lastMeasurement(t.m.id, t.expId);
      html += `<div class="alert"><i class="ti ti-alert-triangle"></i><span>Mouse <strong>${t.mouseId}</strong> (${t.expId}) — burden ${last?burdenShort(last.tumor_sites):'?'} — <strong>approaching endpoint</strong></span></div>`;
    }
  });

  const cols = '82px 82px 1fr 90px 52px 100px';
  function section(title, icon, items) {
    if (!items.length) return '';
    return `<div style="margin-bottom:.75rem">
      <div class="task-section-header"><i class="ti ${icon}" style="font-size:13px;color:var(--text2)"></i>
        <span class="task-section-title">${title}</span><span class="task-count">${items.length}</span></div>
      <div class="task-cols task-header" style="grid-template-columns:${cols}"><span>Mouse</span><span>WP</span><span>Task</span><span>Burden</span><span>Day</span><span></span></div>
      ${items.map(t => `
        <div class="task-row task-cols" style="grid-template-columns:${cols}">
          <span class="mono">${t.mouseId||'—'}</span>
          <span style="font-size:10px;color:var(--text2)">${t.expId||'—'}<br><span style="font-size:9px;color:var(--text3)">${t.researcher||''}</span></span>
          <span style="font-size:11px">${t.label||t.desc||''}${t.lastNote?`<span class="note-pill">${t.lastNote}</span>`:''}</span>
          <span class="burden-badge">${t.type==='measure'?(t.lastBurden||'—'):(t.dose||'')}</span>
          <span style="font-size:10px;color:var(--text3)">${t.dayInTx!=null?'d'+t.dayInTx:''}</span>
          <div style="display:flex;gap:3px;align-items:center">
            ${t.type==='measure'?`<button class="btn btn-green btn-xs" onclick="openLogDaily('${t.expId}','${t.mouseId}')"><i class="ti ti-plus"></i> Log</button>`:''}
            ${t.type==='custom'?`<button class="btn btn-xs ${t.done?'btn-green':''}" onclick="toggleAdHoc('${t.adHocId}')">${t.done?'✓ Done':'Done'}</button>`:''}
            <button class="btn btn-xs btn-icon" title="Reschedule" onclick='rescheduleTask(${JSON.stringify({date:t.date,label:t.label||"",type:t.type,mouseId:t.mouseId||"",expId:t.expId||""})})'>
              <i class="ti ti-calendar-event"></i>
            </button>
          </div>
        </div>
        <div id="il-cont-daily-${t.mouseId}" style="display:none;padding:0 9px 4px"></div>
      `).join('')}
    </div>`;
  }

  if (S.sortBy === 'type') {
    ['measure','treatment','blood','ivis','custom'].forEach(type => {
      html += section(TYPE_LABEL[type], TYPE_ICON[type], tasks.filter(t=>t.type===type));
    });
  } else {
    const byExp = {};
    tasks.forEach(t => { const k=t.expId||'Other'; if(!byExp[k]) byExp[k]=[]; byExp[k].push(t); });
    Object.keys(byExp).sort().forEach(expId => {
      const exp = S.experiments.find(e=>e.id===expId);
      html += `<div class="task-section-header"><div class="edot" style="background:${exp?.color||'#888'}"></div>
        <span class="task-section-title">${expId} — ${exp?.name||''}</span><span class="task-count">${byExp[expId].length}</span></div>`;
      ['measure','treatment','blood','ivis','custom'].forEach(type => {
        html += section(TYPE_LABEL[type], TYPE_ICON[type], byExp[expId].filter(t=>t.type===type));
      });
    });
  }

  if (!tasks.length) html += `<div class="empty"><i class="ti ti-circle-check"></i>No tasks scheduled for today</div>`;
  document.getElementById('content').innerHTML = html;
}

async function toggleAdHoc(id) {
  const t = S.adhoc.find(x => x.id === id);
  if (!t) return;
  await sb.from('adhoc_tasks').update({done: !t.done}).eq('id', id);
  await dbLoad();
  if (S.view === 'daily') renderDaily(); else renderWeek();
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function renderWeek() {
  const monIso = weekMondayISO(S.weekOffset);
  const monD = new Date(monIso);
  const wLabel = `Week of ${monD.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  document.getElementById('page-title').textContent = 'Week view';
  document.getElementById('page-actions').innerHTML = `
    <button class="btn btn-xs" onclick="S.weekOffset--;renderWeek()"><i class="ti ti-arrow-left"></i></button>
    <span style="font-size:11px;color:var(--text2);padding:0 3px">${wLabel}</span>
    <button class="btn btn-xs" onclick="S.weekOffset++;renderWeek()"><i class="ti ti-arrow-right"></i></button>
    <div style="display:flex;gap:3px">
      <button class="sort-btn ${S.sortBy==='type'?'active':''}" onclick="S.sortBy='type';renderWeek()">Type</button>
      <button class="sort-btn ${S.sortBy==='exp'?'active':''}" onclick="S.sortBy='exp';renderWeek()">WP</button>
    </div>
    <select class="form-select" id="wk-filter" onchange="renderWeek()" style="padding:3px 6px;font-size:10px">
      <option value="">All WPs</option>
      ${S.experiments.map(e=>`<option value="${e.id}">${e.id}</option>`).join('')}
    </select>
    <button class="btn btn-xs" onclick="showAddTask()"><i class="ti ti-plus"></i> Add task</button>`;

  const filter = document.getElementById('wk-filter')?.value || '';
  let html = `<div class="week-grid">`;
  for (let i = 0; i < 7; i++) {
    const d = addDays(monIso, i);
    const isToday = d === TODAY_ISO;
    const dayD = new Date(d);
    let dayTasks = getTasksForDate(d);
    if (filter) dayTasks = dayTasks.filter(t => t.expId === filter);
    dayTasks = sortTasks(dayTasks);
    const byType = {};
    dayTasks.forEach(t => { if(!byType[t.type]) byType[t.type]=[]; byType[t.type].push(t); });
    const byExp = {};
    dayTasks.forEach(t => { const k=t.expId||'Other'; if(!byExp[k]) byExp[k]=[]; byExp[k].push(t); });

    html += `<div class="week-day">
      <div class="week-day-header ${isToday?'today':''}">
        ${DOW[dayD.getDay()]} <span style="opacity:.7;font-size:9px">${fmtDate(d)}</span>
        ${isToday?'<span style="font-size:8px;background:var(--blue);color:#fff;border-radius:3px;padding:0 3px;margin-left:2px">today</span>':''}
      </div>`;

    if (S.sortBy === 'type') {
      if (byType.measure?.length) html += `<div class="week-task wt-measure" onclick="weekDetail('${d}','measure')">📏 ${byType.measure.length} measure</div>`;
      if (byType.treatment?.length) html += `<div class="week-task wt-treatment" onclick="weekDetail('${d}','treatment')">💉 ${byType.treatment.length} treat</div>`;
      byType.blood?.forEach(t => html += `<div class="week-task wt-blood" onclick="weekDetail('${d}','blood')">🩸 ${t.mouseId}</div>`);
      byType.ivis?.forEach(t => html += `<div class="week-task wt-ivis">🔬 ${t.mouseId}</div>`);
      byType.custom?.forEach(t => html += `<div class="week-task wt-custom">📋 ${(t.label||'').substring(0,16)}</div>`);
    } else {
      Object.keys(byExp).sort().forEach(expId => {
        const exp = S.experiments.find(e=>e.id===expId);
        const n = byExp[expId].length;
        html += `<div class="week-task" style="background:${exp?.color||'#888'}22;color:${exp?.color||'#444'}" onclick="weekDetail('${d}','','${expId}')">${expId}: ${n} task${n>1?'s':''}</div>`;
      });
    }
    if (!dayTasks.length) html += `<div style="padding:4px 5px;font-size:9px;color:var(--text3)">—</div>`;
    html += `<div style="padding:2px 4px"><button class="btn btn-xs" style="width:100%;justify-content:center;font-size:9px;border-style:dashed;color:var(--text3)" onclick="showAddTask('${d}')"><i class="ti ti-plus"></i></button></div>`;
    html += `</div>`;
  }
  html += `</div><div id="wk-detail"></div>`;
  document.getElementById('content').innerHTML = html;
}

function weekDetail(d, type, expFilter) {
  let tasks = getTasksForDate(d);
  if (type) tasks = tasks.filter(t => t.type === type);
  if (expFilter) tasks = tasks.filter(t => t.expId === expFilter);
  let html = `<div class="card"><div style="font-size:12px;font-weight:500;margin-bottom:.5rem">${type?TYPE_LABEL[type]:expFilter} — ${fmtDate(d)}</div>`;
  tasks.forEach(t => {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--border);font-size:11px">
      <span class="mono" style="min-width:72px">${t.mouseId||'—'}</span>
      <span style="color:var(--text2);min-width:65px">${t.expId||'—'}</span>
      <span style="flex:1">${t.label||t.desc||''}</span>
      <span class="badge badge-gray">${t.type}</span>
      <button class="btn btn-xs" onclick='rescheduleTask(${JSON.stringify({date:d,label:t.label||"",type:t.type,mouseId:t.mouseId||"",expId:t.expId||""})})'>
        <i class="ti ti-calendar-event"></i> Reschedule
      </button>
    </div>`;
  });
  if (!tasks.length) html += `<div class="empty" style="padding:1rem">No tasks</div>`;
  html += `</div>`;
  document.getElementById('wk-detail').innerHTML = html;
}

async function rescheduleTask(taskOrJson) {
  const task = typeof taskOrJson === 'string' ? JSON.parse(taskOrJson) : taskOrJson;
  const newDate = prompt('Reschedule to date (YYYY-MM-DD):', addDays(task.date||TODAY_ISO, 1));
  if (!newDate) return;
  const reason = prompt('Reason (logged as protocol deviation):', '');
  if (reason === null) return;
  await sb.from('adhoc_tasks').insert({
    experiment_id: task.expId||null, mouse_id: task.mouseId||null,
    task_date: newDate, type: task.type, description: task.label,
    note: `Rescheduled from ${task.date}: ${reason||'no reason'}`,
    original_task_key: task.label && task.mouseId ? `${task.label}-${task.mouseId}` : null
  });
  // Log deviation
  if (task.expId) {
    await sb.from('deviation_log').insert({
      experiment_id: task.expId, mouse_id: task.mouseId||null,
      event_type: task.type, original_date: task.date, actual_date: newDate, reason
    });
  }
  await dbLoad();
  if (S.view === 'daily') renderDaily(); else renderWeek();
}

// ── ADD TASK ──────────────────────────────────────────────────────────────────
function showAddTask(defaultDate) {
  const allMice = [];
  S.experiments.forEach(e => (S.mice[e.id]||[]).filter(m=>m.status==='active').forEach(m => allMice.push({id:m.id,expId:e.id})));
  showModal('Add task', `
    <div class="form-grid-2">
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="at-date" type="date" value="${defaultDate||TODAY_ISO}"></div>
      <div class="form-group"><label class="form-label">Task type</label>
        <select class="form-select" id="at-type"><option value="custom">General</option><option value="measure">Measurement</option><option value="blood">Blood draw</option><option value="treatment">Treatment</option><option value="ivis">IVIS</option></select>
      </div>
      <div class="form-group form-full"><label class="form-label">Description</label><input class="form-input" id="at-desc" placeholder="e.g. extra blood draw per vet request" autofocus></div>
      <div class="form-group form-full"><label class="form-label">Mouse (blank = general task)</label>
        <select class="form-select" id="at-mouse"><option value="">No specific mouse</option>${allMice.map(m=>`<option value="${m.id}|${m.expId}">${m.id} (${m.expId})</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Note for technician</label><input class="form-input" id="at-note" placeholder="discuss with researcher first"></div>`,
    `<button class="btn btn-xs" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-xs" onclick="submitAddTask()"><i class="ti ti-check"></i> Add task</button>`);
}

async function submitAddTask() {
  const date = document.getElementById('at-date')?.value || TODAY_ISO;
  const type = document.getElementById('at-type')?.value || 'custom';
  const desc = (document.getElementById('at-desc')?.value||'').trim();
  const mouseVal = document.getElementById('at-mouse')?.value || '';
  const note = document.getElementById('at-note')?.value || '';
  if (!desc) { alert('Enter description'); return; }
  let mouseId = null, expId = null;
  if (mouseVal) { [mouseId, expId] = mouseVal.split('|'); }
  await sb.from('adhoc_tasks').insert({task_date:date, type, description:desc, mouse_id:mouseId, experiment_id:expId, note, done:false});
  await dbLoad();
  closeModal();
  if (S.view === 'daily') renderDaily(); else renderWeek();
}

// ── ALL EXPERIMENTS ───────────────────────────────────────────────────────────

      const gevents = S.events[g.id] || [];
      html += `<div class="group-block">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:.4rem">
          <div class="edot" style="background:${g.color}"></div>
          <span style="font-size:11px;font-weight:500">${g.name}</span>
        </div>`;
      gevents.forEach(ev => {
        const tc = {measure:'badge-green',treatment:'badge-blue',blood:'badge-red',ivis:'badge-purple',custom:'badge-amber'}[ev.type]||'badge-gray';
        html += `<div class="event-block">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <span class="badge ${tc}">${ev.type}</span>
            <span style="font-size:11px;font-weight:500">${ev.label||ev.drug||''}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;font-size:10px;color:var(--text2)">
            <div><div style="color:var(--text3)">Schedule</div>${ev.schedule_type==='fixed-days'?(ev.schedule_days||[]).map(d=>DOW[d]).join('+'):ev.schedule_type==='interval'?'every '+ev.interval_days+'d':ev.schedule_type}</div>
            <div><div style="color:var(--text3)">Trigger</div>${ev.trigger_type}${ev.trigger_value?' @ '+ev.trigger_value:ev.day_offset?' +'+ev.day_offset+'d':''}</div>
            <div><div style="color:var(--text3)">Dose</div>${ev.dose?ev.dose+' '+(ev.route||''):'—'}</div>
            <div><div style="color:var(--text3)">Max doses</div>${ev.max_doses!=null?ev.max_doses+'×':'∞'}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
  if (S.expTab === 'growth') setTimeout(() => drawGrowth(exp, groups), 50);
  if (S.expTab === 'km') setTimeout(() => drawKM(exp, groups), 50);
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
const charts = {};
function drawGrowth(exp, groups) {
  const ctx = document.getElementById('growthChart'); if (!ctx) return;
  const key = 'g'+exp.id; if (charts[key]) { charts[key].destroy(); }
  const allD = new Set();
  Object.values(S.measurements[exp.id]||{}).forEach(msList =>
    msList.forEach(ms => { if (ms.tumor_sites?.some(s=>s.dim1)) allD.add(ms.measured_at); }));
  const labs = Array.from(allD).sort();
  if (!labs.length) { ctx.parentElement.innerHTML = '<div class="empty">No measurement data yet</div>'; return; }
  const datasets = [];
  groups.forEach(g => {
    const mice = (S.mice[exp.id]||[]).filter(m => m.group_name === g.name || m.group_id === g.id);
    if (S.plotMode === 'individual' || S.plotMode === 'both') {
      mice.forEach(m => {
        const msList = (S.measurements[exp.id]||{})[m.id] || [];
        const data = labs.map(d => { const ms = msList.find(x=>x.measured_at===d&&x.tumor_sites?.some(s=>s.dim1)); return ms ? Math.round(totalBurden(ms.tumor_sites)) : null; });
        if (data.some(v=>v!=null)) datasets.push({label:m.id, data, borderColor:g.color, backgroundColor:'transparent', tension:.3, fill:false, spanGaps:true, pointRadius:2, borderWidth:1.2, borderDash:[4,3]});
      });
    }
    if (S.plotMode === 'mean' || S.plotMode === 'both') {
      const meanData = labs.map(d => {
        const vals = mice.map(m => { const ms = ((S.measurements[exp.id]||{})[m.id]||[]).find(x=>x.measured_at===d&&x.tumor_sites?.some(s=>s.dim1)); return ms ? totalBurden(ms.tumor_sites) : null; }).filter(v=>v!=null);
        return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
      });
      if (meanData.some(v=>v!=null)) datasets.push({label:g.name+' (mean)', data:meanData, borderColor:g.color, backgroundColor:g.color+'22', tension:.3, fill:false, spanGaps:true, pointRadius:4, borderWidth:2.5});
    }
  });
  charts[key] = new Chart(ctx, {type:'line', data:{labels:labs.map(d=>d.slice(5)), datasets}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:9},maxRotation:45}, grid:{color:'rgba(128,128,128,0.08)'}}, y:{title:{display:true,text:'Burden (mm²)',font:{size:9}}, ticks:{font:{size:9}}, grid:{color:'rgba(128,128,128,0.08)'},min:0}}}});
}

function drawKM(exp, groups) {
  const ctx = document.getElementById('kmChart'); if (!ctx) return;
  const key = 'k'+exp.id; if (charts[key]) { charts[key].destroy(); }
  function buildKM(mice) {
    const evs = mice.map(m => {
      if (!m.tx_start) return null;
      const eD = m.sac_date ? new Date(m.sac_date) : TODAY;
      return {days: Math.round((eD-new Date(m.tx_start))/86400000), event: m.cause==='endpoint'?1:0};
    }).filter(Boolean).sort((a,b)=>a.days-b.days);
    let s=1, n=evs.length; const pts=[{x:0,y:1}];
    evs.forEach((e,i) => { if(e.event===1) s*=(n-i-1)/(n-i); pts.push({x:e.days, y:Math.max(0,s)}); });
    return pts;
  }
  const datasets = groups.map(g => {
    const mice = (S.mice[exp.id]||[]).filter(m=>m.group_name===g.name||m.group_id===g.id);
    if (!mice.length) return null;
    return {label:g.name, data:buildKM(mice), borderColor:g.color, backgroundColor:'transparent', stepped:'before', tension:0, fill:false, pointRadius:0, borderWidth:2};
  }).filter(Boolean);
  if (!datasets.length) { ctx.parentElement.innerHTML = '<div class="empty">No survival data yet</div>'; return; }
  charts[key] = new Chart(ctx, {type:'line', data:{datasets}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{type:'linear', title:{display:true,text:'Days from tx start',font:{size:9}}, ticks:{font:{size:9}}, grid:{color:'rgba(128,128,128,0.08)'}}, y:{min:0, max:1, title:{display:true,text:'Survival',font:{size:9}}, ticks:{font:{size:9}, callback:v=>Math.round(v*100)+'%'}, grid:{color:'rgba(128,128,128,0.08)'}}}}});
}

async function enrollMouse(expId, groupId, groupName) {
  const mouseId = (document.getElementById('en-id')?.value||'').trim();
  if (!mouseId) { alert('Enter mouse ID'); return; }
  const enrolled = document.getElementById('en-date')?.value || TODAY_ISO;
  const txStart = document.getElementById('en-tx')?.value || enrolled;
  const geno = document.getElementById('en-geno')?.value || '';
  const dob = document.getElementById('en-dob')?.value || null;
  const wt = parseFloat(document.getElementById('en-wt')?.value||'');
  const notes = document.getElementById('en-notes')?.value || '';
  const {error} = await sb.from('mice').insert({
    id: mouseId, experiment_id: expId, group_id: groupId, group_name: groupName,
    enrolled, tx_start: txStart, genotype: geno, dob: dob||null,
    status:'active', weight: isNaN(wt)?null:wt, notes, completed_events:[]
  });
  if (error) { alert('Error: ' + error.message); return; }
  closeModal();
  await loadData(expId);
  renderExperiment(expId);
}

function renderNGGroups() {
  return NG.map((g,gi) => `
    <div class="group-block">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">
        <div style="display:flex;align-items:center;gap:7px">
          <div class="edot" style="background:${g.color}"></div>
          <input class="form-input" value="${g.name}" style="width:185px;font-size:11px;padding:3px 6px" oninput="NG[${gi}].name=this.value">
          <span style="font-size:10px;color:var(--text2)">N:</span>
          <input class="form-input" type="number" value="${g.n}" style="width:48px;font-size:11px;padding:3px 5px" oninput="NG[${gi}].n=parseInt(this.value)||0">
        </div>
        ${gi>0?`<button class="btn btn-xs" onclick="NG.splice(${gi},1);document.getElementById('ng-cont').innerHTML=renderNGGroups()"><i class="ti ti-trash"></i></button>`:''}
      </div>
      ${g.events.map((ev,ei) => renderNGEvent(gi,ei,ev)).join('')}
      <button class="btn btn-xs" style="margin-top:3px" onclick="addNGEvent(${gi})"><i class="ti ti-plus"></i> Add event</button>
    </div>`).join('');
}

function renderNGEvent(gi,ei,ev) {
  const types = ['measure','treatment','blood','ivis','custom'];
  const typeSel = types.map(t => {
    const selClass = ev.type===t ? `sel-${t}` : '';
    return `<span class="evt-chip ${selClass}" onclick="NG[${gi}].events[${ei}].type='${t}';document.getElementById('ng-cont').innerHTML=renderNGGroups()">${t}</span>`;
  }).join('');
  const dayPicker = [1,2,3,4,5].map(d =>
    `<span class="day-btn ${ev.days&&ev.days.includes(d)?'selected':''}" onclick="toggleNGDay(${gi},${ei},${d})">${DOW[d]}</span>`
  ).join('');
  const trigOpts = ['enrollment','size','age','day-after-tx','endpoint']
    .map(t => `<option value="${t}" ${ev.trigger===t?'selected':''}>${t}</option>`).join('');
  return `<div class="event-block">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <div>${typeSel}</div>
      ${ei>0?`<button class="btn btn-xs" onclick="NG[${gi}].events.splice(${ei},1);document.getElementById('ng-cont').innerHTML=renderNGGroups()"><i class="ti ti-x"></i></button>`:''}
    </div>
    <div class="form-grid-2" style="margin-bottom:5px">
      <div class="form-group"><label class="form-label">Label</label><input class="form-input" style="font-size:10px;padding:3px 5px" value="${ev.label||''}" placeholder="e.g. anti-PD1 IP" oninput="NG[${gi}].events[${ei}].label=this.value"></div>
      ${ev.type==='treatment'?`<div class="form-group"><label class="form-label">Drug / dose / route</label><div style="display:flex;gap:3px">
        <input class="form-input" style="flex:2;font-size:10px;padding:3px 5px" value="${ev.drug||''}" placeholder="drug" oninput="NG[${gi}].events[${ei}].drug=this.value">
        <input class="form-input" style="flex:1;font-size:10px;padding:3px 4px" value="${ev.dose||''}" placeholder="dose" oninput="NG[${gi}].events[${ei}].dose=this.value">
        <select class="form-select" style="flex:1;font-size:10px;padding:3px 3px" onchange="NG[${gi}].events[${ei}].route=this.value"><option>IP</option><option>IV</option><option>SC</option><option>PO</option></select>
      </div></div>`:'<div></div>'}
    </div>
    <div style="margin-bottom:5px">
      <div class="form-label" style="margin-bottom:3px">Schedule</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <div>${dayPicker}</div>
        <select class="form-select" style="font-size:10px;padding:3px 5px" onchange="NG[${gi}].events[${ei}].schedule=this.value;document.getElementById('ng-cont').innerHTML=renderNGGroups()">
          <option value="fixed-days" ${ev.schedule==='fixed-days'?'selected':''}>Fixed days of week</option>
          <option value="interval" ${ev.schedule==='interval'?'selected':''}>Every N days</option>
          <option value="once" ${ev.schedule==='once'?'selected':''}>Once only</option>
        </select>
        ${ev.schedule==='interval'?`<div style="display:flex;align-items:center;gap:3px"><span class="form-label">Every</span><input class="form-input" type="number" min="1" style="width:52px;font-size:10px;padding:3px 5px" value="${ev.intervalDays||7}" oninput="NG[${gi}].events[${ei}].intervalDays=parseInt(this.value)||7"><span class="form-label">days</span></div>`:''}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group"><label class="form-label">Start trigger</label>
        <select class="form-select" style="font-size:10px;padding:3px 5px" onchange="NG[${gi}].events[${ei}].trigger=this.value;document.getElementById('ng-cont').innerHTML=renderNGGroups()">${trigOpts}</select>
      </div>
      ${ev.trigger==='size'||ev.trigger==='age'?`<div class="form-group"><label class="form-label">Value</label><input class="form-input" style="width:80px;font-size:10px;padding:3px 5px" value="${ev.triggerVal||''}" placeholder="${ev.trigger==='size'?'3×3':'14 weeks'}" oninput="NG[${gi}].events[${ei}].triggerVal=this.value"></div>`:''}
      ${ev.trigger==='day-after-tx'?`<div class="form-group"><label class="form-label">Day offset</label><input class="form-input" type="number" style="width:65px;font-size:10px;padding:3px 5px" value="${ev.dayOffset||0}" oninput="NG[${gi}].events[${ei}].dayOffset=parseInt(this.value)||0"></div>`:''}
      <div class="form-group"><label class="form-label">Max doses</label><input class="form-input" type="number" style="width:60px;font-size:10px;padding:3px 5px" value="${ev.maxDoses||''}" placeholder="∞" oninput="NG[${gi}].events[${ei}].maxDoses=this.value?parseInt(this.value):null"></div>
    </div>
  </div>`;
}

function toggleNGDay(gi,ei,d) {
  const ev = NG[gi].events[ei];
  if (!ev.days) ev.days = [];
  const idx = ev.days.indexOf(d);
  if (idx>=0) ev.days.splice(idx,1); else ev.days.push(d);
  document.getElementById('ng-cont').innerHTML = renderNGGroups();
}
function addNG() {
  NG.push({name:`Group ${NG.length+1}`, n:8, color:COLS[NG.length%COLS.length], events:[
    {type:'measure',label:'Tumor measurement',schedule:'fixed-days',days:[1,4],trigger:'enrollment',triggerVal:'',dayOffset:0,maxDoses:null,drug:'',dose:'',route:'IP',intervalDays:7},
    {type:'treatment',label:'',drug:'',dose:'',route:'IP',schedule:'fixed-days',days:[1,4],trigger:'size',triggerVal:'3×3',dayOffset:0,maxDoses:null,intervalDays:7}
  ]});
  document.getElementById('ng-cont').innerHTML = renderNGGroups();
}
function addNGEvent(gi) {
  NG[gi].events.push({type:'treatment',label:'',drug:'',dose:'',route:'IP',schedule:'fixed-days',days:[1,4],trigger:'size',triggerVal:'3×3',dayOffset:0,maxDoses:null,intervalDays:7});
  document.getElementById('ng-cont').innerHTML = renderNGGroups();
}

async function createExp() {
  const wp = (document.getElementById('nwp')?.value||'').trim();
  const res = (document.getElementById('nres')?.value||'').trim();
  const tit = (document.getElementById('ntit')?.value||'').trim();
  if (!wp||!res||!tit) { alert('Fill WP number, researcher, and title'); return; }
  const multiTumor = document.getElementById('nmulti')?.checked || false;

  const btn = document.querySelector('button[onclick="createExp()"]');
  if (btn) btn.disabled = true;

  const {error: expErr} = await sb.from('experiments').insert({
    id: wp, name: tit, researcher: res,
    color: COLS[S.experiments.length % COLS.length],
    model: document.getElementById('nmod')?.value||'',
    strain: document.getElementById('nstr')?.value||'',
    started: TODAY_ISO, status:'active',
    multi_tumor: multiTumor,
    endpoint_criterion: document.getElementById('nep')?.value||'',
    harvest: document.getElementById('nhar')?.value||''
  });
  if (expErr) { alert('Error creating experiment: ' + expErr.message); if(btn)btn.disabled=false; return; }

  for (let i=0; i<NG.length; i++) {
    const g = NG[i];
    const {data:gData, error:gErr} = await sb.from('experiment_groups').insert({
      experiment_id: wp, name: g.name, color: g.color,
      target_n: g.n, sort_order: i
    }).select().single();
    if (gErr || !gData) continue;
    for (let j=0; j<g.events.length; j++) {
      const ev = g.events[j];
      await sb.from('scheduled_events').insert({
        group_id: gData.id, experiment_id: wp,
        type: ev.type, label: ev.label||'', drug: ev.drug||'',
        dose: ev.dose||'', route: ev.route||'',
        schedule_type: ev.schedule,
        schedule_days: ev.days || [],
        interval_days: ev.schedule==='interval' ? ev.intervalDays : null,
        trigger_type: ev.trigger, trigger_value: ev.triggerVal||'',
        day_offset: ev.dayOffset||0,
        max_doses: ev.maxDoses||null,
        sort_order: j
      });
    }
  }

  await dbLoad();
  buildExpNav();
  S.expTab = 'mice';
  navigate('exp-'+wp);
}
