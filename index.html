<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MouseTracker — NKI Immunology</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f8f8f7;--surface:#fff;--surface2:#f1f0eb;--surface3:#e8e6df;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#98968f;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#C0DD97;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-border:#FAC775;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-border:#F7C1C1;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Monaco','Inconsolata',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.auth-card{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--rl);padding:2rem;width:380px}
.auth-logo{text-align:center;margin-bottom:1.5rem}
.auth-logo h1{font-size:20px;font-weight:500;margin-bottom:.25rem}
.auth-logo p{font-size:11px;color:var(--text2)}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;align-items:start}
.user-btn{padding:.625rem .625rem .5rem;border:.5px solid var(--border);border-radius:var(--r);background:var(--surface2);cursor:pointer;text-align:center;font-size:12px;font-family:var(--font);color:var(--text);transition:all .1s;width:100%;display:block;box-sizing:border-box}
.user-btn:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.user-avatar{width:32px;height:32px;border-radius:50%;margin:0 auto .375rem;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff}
.auth-div{display:flex;align-items:center;gap:.5rem;color:var(--text3);font-size:11px;margin:.75rem 0}
.auth-div::before,.auth-div::after{content:'';flex:1;height:.5px;background:var(--border)}
.add-user-form{display:none;gap:8px;margin-top:.75rem}
.add-user-form.vis{display:flex}
#app{display:none;height:100vh;flex-direction:column}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1.25rem;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:.75rem}
.tb-title{font-size:14px;font-weight:500}
.tb-user{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--r);background:var(--surface2);font-size:11px;cursor:pointer}
.tb-user:hover{background:var(--surface3)}
.udot{width:8px;height:8px;border-radius:50%}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;padding:.5rem 0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-hdr{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1.25rem;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:.5rem;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:.875rem 1.25rem}
.nav-sec{padding:.45rem 1rem .15rem;font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.nav-i{display:flex;align-items:center;gap:7px;padding:6px 1rem;font-size:12px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.nav-i:hover{background:var(--surface2);color:var(--text)}
.nav-i.act{color:var(--blue);border-left-color:var(--blue);background:var(--blue-bg);font-weight:500}
.nav-i i{font-size:14px}
.nav-exp{display:flex;align-items:center;gap:6px;padding:4px 1rem 4px 1.5rem;font-size:11px;color:var(--text2);cursor:pointer}
.nav-exp:hover{color:var(--text)}
.edot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ndiv{height:.5px;background:var(--border);margin:.4rem 0}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;font-size:11px;border-radius:var(--r);cursor:pointer;border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--font);transition:background .1s}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:var(--blue-dark)}
.btn-g{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.btn-g:hover{background:var(--green-border)}
.btn-a{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.btn-r{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn-xs{padding:2px 6px;font-size:10px}
.btn-icon{padding:3px 5px}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500}
.bg{background:var(--green-bg);color:var(--green)}
.ba{background:var(--amber-bg);color:var(--amber)}
.br{background:var(--red-bg);color:var(--red)}
.bb{background:var(--blue-bg);color:var(--blue)}
.bgy{background:var(--surface2);color:var(--text2)}
.bp{background:var(--purple-bg);color:var(--purple)}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:.75rem 1rem;margin-bottom:.75rem}
.mc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.75rem}
.mc{background:var(--surface2);border-radius:var(--r);padding:.5rem .75rem}
.mc-l{font-size:10px;color:var(--text2);margin-bottom:2px}
.mc-v{font-size:20px;font-weight:500}
hr.div{border:none;border-top:.5px solid var(--border);margin:.625rem 0}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:.75rem}
.tab{padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px}
.tab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tab:hover{color:var(--text)}
.alert{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--r);background:var(--amber-bg);border:.5px solid var(--amber-border);margin-bottom:4px;font-size:11px;color:#633806}
.task-sh{display:flex;align-items:center;gap:6px;margin:.75rem 0 .3rem}
.task-st{font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.task-sc{font-size:10px;background:var(--surface2);color:var(--text2);padding:1px 5px;border-radius:8px}
.task-row{padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--surface);margin-bottom:3px;display:grid;gap:6px;align-items:center}
.task-row:hover{background:var(--surface2)}
.npill{background:var(--amber-bg);color:var(--amber);border-radius:3px;padding:0 4px;font-size:9px;margin-left:3px}
.hv-wrap{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface2);color:var(--text3);cursor:pointer;font-size:11px;position:relative;vertical-align:middle;margin-left:4px}
.hv-wrap:hover .hv-tip{display:block}
.hv-tip{display:none;position:fixed;background:var(--text);color:#fff;font-size:10px;border-radius:var(--r);padding:6px 9px;width:300px;z-index:9999;line-height:1.5;white-space:normal;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3);top:auto;left:auto}
.mt{overflow:visible!important}
.mt td{overflow:visible!important}
.il{background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;margin-top:4px;min-width:0;width:100%}
.il-row{display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap;min-width:0}
.il-in{min-width:0}
.il-g{display:flex;flex-direction:column;gap:2px}
.il-l{font-size:9px;color:var(--text3)}
.il-in{padding:4px 7px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.il-in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg)}
.site-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.sin{padding:3px 6px;font-size:11px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.sin:focus{outline:none;border-color:var(--blue)}
.skin-chk{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.mt{width:100%;font-size:11px;border-collapse:collapse;table-layout:fixed;overflow:visible}
.mt th{text-align:left;padding:4px 6px;font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:.5px solid var(--border);white-space:nowrap;overflow:hidden}
.mt td{padding:5px 6px;border-bottom:.5px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
.mt tr:last-child td{border-bottom:none}
.mt tr:hover td{background:var(--surface2)}
.mt tr.log-row td,.mt tr.hist-row td{overflow:visible!important;white-space:normal!important;padding:0!important;border-bottom:none}
.mono{font-family:var(--mono);font-size:10px}
.hw{background:var(--surface2);border-radius:var(--r);overflow:hidden;margin-top:4px}
.ht{width:100%;font-size:10px;border-collapse:collapse}
.ht th{text-align:left;padding:4px 6px;font-size:9px;color:var(--text3);border-bottom:.5px solid var(--border);background:var(--surface3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.ht td{padding:4px 6px;border-bottom:.5px solid var(--border)}
.ht tr:last-child td{border-bottom:none}
.ht tr:hover td{background:var(--surface)}
.ev-row td{background:var(--blue-bg)!important;color:var(--blue-dark)}
.ev-row.tr td{background:#F0F4FF!important}
.ev-row.sac td{background:var(--red-bg)!important;color:var(--red)}
.d0-row td{background:#FFFBEA!important}
.d0-badge{background:#F59E0B;color:#fff;border-radius:3px;padding:0 4px;font-size:9px;margin-left:4px}
.d0-btn{padding:1px 5px;font-size:9px;border-radius:3px;cursor:pointer;border:.5px solid var(--green-border);background:var(--green-bg);color:var(--green);font-family:var(--font);white-space:nowrap}
.d0-btn:hover{background:var(--green-border)}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:.75rem}
.wk-day{border:.5px solid var(--border);border-radius:var(--r);background:var(--surface);min-height:100px}
.wdh{padding:4px 6px;border-bottom:.5px solid var(--border);font-size:10px;font-weight:500}
.wdh.today{background:var(--blue-bg);color:var(--blue)}
.wt{margin:2px 3px;padding:2px 5px;border-radius:3px;font-size:9px;cursor:pointer}
.wt:hover{opacity:.8}
.wt-m{background:var(--green-bg);color:var(--green)}
.wt-t{background:var(--blue-bg);color:var(--blue)}
.wt-b{background:var(--red-bg);color:var(--red)}
.wt-i{background:var(--purple-bg);color:var(--purple)}
.wt-c{background:var(--amber-bg);color:var(--amber)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;font-weight:500;color:var(--text2)}
.fi{padding:6px 9px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg)}
.fs{padding:6px 9px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.fs:focus{outline:none;border-color:var(--blue)}
.grp-blk{border:.5px solid var(--border);border-radius:var(--r);padding:.625rem .75rem;margin-bottom:.625rem}
.ev-blk{background:var(--surface2);border-radius:var(--r);padding:.4rem .625rem;margin-bottom:.4rem;border:.5px solid var(--border)}
.day-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:26px;border-radius:var(--r);border:.5px solid var(--border2);font-size:10px;cursor:pointer;color:var(--text2);margin-right:2px}
.day-btn.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.day-btn:hover:not(.sel){background:var(--surface2)}
.ec{padding:2px 7px;border-radius:8px;font-size:10px;cursor:pointer;border:.5px solid var(--border2);color:var(--text2);margin-right:3px;margin-bottom:2px;display:inline-block}
.ec.sel-measure{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.ec.sel-treatment{background:var(--blue-bg);color:var(--blue);border-color:#B5D4F4}
.ec.sel-blood{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.ec.sel-ivis{background:var(--purple-bg);color:var(--purple);border-color:#CECBF6}
.ec.sel-custom{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:var(--surface);border-radius:var(--rl);border:.5px solid var(--border);width:460px;max-height:88vh;overflow-y:auto;padding:1.25rem}
.modal-t{font-size:13px;font-weight:500;margin-bottom:.875rem}
.modal-f{display:flex;gap:7px;justify-content:flex-end;margin-top:.875rem;padding-top:.875rem;border-top:.5px solid var(--border)}
.pt-btn{padding:2px 8px;font-size:10px;border-radius:var(--r);cursor:pointer;border:.5px solid var(--border2);color:var(--text2);background:var(--surface)}
.pt-btn.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.srt-btn{padding:3px 7px;font-size:10px;border-radius:var(--r);cursor:pointer;border:.5px solid var(--border2);color:var(--text2);background:var(--surface)}
.srt-btn.act{background:var(--blue-bg);color:var(--blue);border-color:#B5D4F4}
.burden-badge{font-family:var(--mono);font-size:10px;background:var(--surface2);border-radius:3px;padding:1px 5px}
.cage-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);background:var(--surface2);border-radius:3px;padding:1px 5px;cursor:pointer}
.cage-tag:hover{background:var(--surface3);color:var(--text2)}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:12px}
.empty i{font-size:28px;display:block;margin-bottom:.5rem}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.5rem;color:var(--text2);font-size:12px}
.float-bar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:var(--rl);padding:.625rem 1rem;display:flex;align-items:center;gap:.75rem;box-shadow:0 4px 24px rgba(0,0,0,.3);z-index:300;font-size:12px;white-space:nowrap}
.float-bar select,.float-bar input{padding:4px 8px;border-radius:var(--r);border:none;font-size:11px;font-family:var(--font);background:#fff;color:var(--text);width:160px}
.float-bar .btn{border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.15)}
.float-bar .btn:hover{background:rgba(255,255,255,.25)}
.float-bar .btn-g{background:#3B6D11;border-color:#3B6D11}
.mouse-chk{width:14px;height:14px;cursor:pointer;accent-color:var(--blue)}
.print-harvest{display:none}
.print-site-rows td{padding:2px 5px;border-bottom:0.5px solid #eee;font-size:10px}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><h1>MouseTracker</h1><p>NKI Immunology Lab</p></div>
    <!-- Step 1: Password -->
    <div id="auth-step1">
      <div id="pw-error" style="color:var(--red);font-size:11px;display:none;margin-bottom:.5rem">Incorrect password</div>
      <input class="fi" id="pw-input" type="password" placeholder="Lab password" style="width:100%;margin-bottom:.5rem" onkeydown="if(event.key==='Enter')checkPW()">
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:9px" onclick="checkPW()"><i class="ti ti-lock"></i> Continue</button>
    </div>
    <!-- Step 2: User picker (shown after password) -->
    <div id="auth-step2" style="display:none">
      <p style="font-size:11px;color:var(--text2);margin-bottom:.75rem">Who are you?</p>
      <div class="user-grid" id="user-grid"><div class="loading"><div class="spin"></div></div></div>
      <div class="auth-div">or</div>
      <button class="btn" style="width:100%;justify-content:center" onclick="toggleAddUser()"><i class="ti ti-user-plus"></i> Add new user</button>
      <div class="add-user-form" id="add-user-form">
        <input class="fi" id="new-user-fname" placeholder="First name" style="flex:1">
        <input class="fi" id="new-user-lname" placeholder="Last name" style="flex:1">
        <input class="fi" id="new-user-code" placeholder="Code (TL)" style="width:70px" maxlength="3">
        <select class="fs" id="new-user-role" style="width:100px"><option value="technician">Technician</option><option value="researcher">Researcher</option><option value="pi">PI</option></select>
        <button class="btn btn-p" onclick="addUser()"><i class="ti ti-check"></i></button>
      </div>
    </div>
  </div>
</div>
<div id="app" style="display:none">
  <div id="float-bar" style="display:none" class="float-bar">
    <span id="float-count" style="font-size:11px;opacity:.8">0 selected</span>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.2)"></div>
    <span style="font-size:11px">Move to:</span>
    <select id="float-group-sel"></select>
    <button class="btn btn-g btn-xs" onclick="bulkMoveGroup()"><i class="ti ti-arrows-exchange"></i> Move</button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.2)"></div>
    <span style="font-size:11px">Note:</span>
    <input id="float-note-in" placeholder="Add note to all selected..." onkeydown="if(event.key==='Enter')bulkAddNote()">
    <button class="btn btn-xs" onclick="bulkAddNote()"><i class="ti ti-check"></i> Add</button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.2)"></div>
    <button class="btn btn-xs" onclick="showBulkCage()"><i class="ti ti-cage"></i> Change cage</button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.2)"></div>
    <button class="btn btn-xs" onclick="clearSelection()" style="color:rgba(255,255,255,.6)"><i class="ti ti-x"></i></button>
  </div>
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-title">MouseTracker</div>
      <div class="tb-user" id="tb-user" onclick="switchUser()">
        <div class="udot" id="tb-dot"></div>
        <span id="tb-name">—</span><span style="font-size:9px;color:var(--text3);margin-left:6px;opacity:.6">v54</span>
        <i class="ti ti-chevron-down" style="font-size:10px;color:var(--text3)"></i>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center" id="tb-acts"></div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="nav-sec">Technician</div>
      <div class="nav-i act" id="nav-daily" onclick="go('daily')"><i class="ti ti-calendar-today"></i> Daily tasks</div>
      <div class="nav-i" id="nav-week" onclick="go('week')"><i class="ti ti-calendar-week"></i> Week view</div>
      <div class="ndiv"></div>
      <div class="nav-sec">Experiments</div>
      <div class="nav-i" id="nav-exps" onclick="go('exps')"><i class="ti ti-flask"></i> All experiments</div>
      <div class="nav-i" id="nav-new" onclick="go('new')"><i class="ti ti-plus"></i> New experiment</div>
      <div class="ndiv"></div>
      <div class="nav-sec">Active</div>
      <div id="exp-nav"></div>
    </div>
    <div class="main">
      <div class="main-hdr">
        <div style="font-size:14px;font-weight:500" id="pg-title">Daily tasks</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap" id="pg-acts"></div>
      </div>
      <div class="content" id="content"><div class="loading"><div class="spin"></div> Loading...</div></div>
    </div>
  </div>
</div>

// HELPERS
function parseSz(s){if(!s)return null;const m=s.toString().match(/(\d+\.?\d*)\s*[x\xd7X]\s*(\d+\.?\d*)/);return m?{v1:parseFloat(m[1]),v2:parseFloat(m[2])}:null}
function sArea(s){return(s.dim1||0)*(s.dim2||0)}
function burden(sites,incSkin){incSkin=incSkin===undefined?true:incSkin;return(sites||[]).reduce(function(t,s){
  if(s.status==='gone'||s.status==='nm')return t;
  return t+(incSkin||!s.is_skin?sArea(s):0);
},0)}
function bShort(sites,incSkin){
  incSkin=incSkin===undefined?true:incSkin;
  if(!sites||!sites.length)return'--';
  var active=sites.filter(function(s){return s.status!=='gone'&&s.status!=='nm'});
  if(active.length===0){
    var gone=sites.filter(function(s){return s.status==='gone'}).length;
    return gone?gone+' Gone':'NM';
  }
  if(active.length===1&&!active[0].is_skin)return active[0].dim1&&active[0].dim2?active[0].dim1+'x'+active[0].dim2:'--';
  var t=Math.round(burden(sites,incSkin));
  return t+'mm2'+(sites.length>1?' ('+sites.length+' sites)':'');
}
function bFull(sites){
  if(!sites||!sites.length)return'--';
  const p=sites.map(function(s){return(s.location?s.location+' ':'')+s.dim1+'x'+s.dim2+(s.is_skin?' (skin)':'')}).join(' + ');
  const t=Math.round(burden(sites,true)),tn=Math.round(burden(sites,false));
  return p+(sites.length>1?' = '+t+'mm2'+(tn!==t?' ('+tn+'mm2 excl. skin)':''):'');
}
function lastMs(mid,eid){var ms=((S.measurements[eid]||{})[mid]||[]).filter(function(x){return x.tumor_sites&&x.tumor_sites.some(function(s){return s.dim1})});return ms.length?ms[ms.length-1]:null}
function findTodaysMeasureIdx(eid,mid,dateIso){
  var msl=(S.measurements[eid]||{})[mid]||[];
  for(var i=msl.length-1;i>=0;i--){if(msl[i].measured_at===dateIso)return i;}
  return -1;
}
function nearEP(mid,eid){var l=lastMs(mid,eid);return l?burden(l.tumor_sites,false)>=81:false}
function dInTx(m){if(!m.tx_start)return null;return Math.round((new Date(TISO)-new Date(m.tx_start))/86400000)}
function addD(iso,n){var d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function wkMon(off){var d=new Date(TODAY);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day)+off*7);return d.toISOString().slice(0,10)}
function fmtD(iso){return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function uname(){return S.user&&S.user.name?S.user.name:'Unknown'}

// TASK GENERATOR
function getTasksForDate(iso){
  var d=new Date(iso),dow=d.getDay(),tasks=[];
  S.experiments.filter(function(e){return e.status==='active'}).forEach(function(exp){
    (S.mice[exp.id]||[]).filter(function(m){return m.status==='active'}).forEach(function(m){
      var g=(S.groups[exp.id]||[]).find(function(g){return g.id===m.group_id||g.name===m.group_name});if(!g)return;
      var gevts=S.events[g.id]||[];
      var last=lastMs(m.id,exp.id);
      var txD=m.tx_start?new Date(m.tx_start):null;
      var enD=m.enrolled?new Date(m.enrolled):null;
      var tgtD=new Date(iso);
      gevts.forEach(function(ev){
        if((ev.type==='measure'||ev.type==='measure-tumor'||ev.type==='measure-weight')&&ev.schedule_type==='fixed-days'&&(ev.schedule_days||[]).includes(dow)&&enD&&tgtD>=enD){
          var taskType=ev.type==='measure-weight'?'measure-weight':(ev.type==='measure-tumor'?'measure-tumor':'measure');
          tasks.push({type:taskType,mouseId:m.id,expId:exp.id,expName:exp.name,researcher:exp.researcher,group:g.name,groupColor:g.color,label:ev.label,lastBurden:last?bShort(last.tumor_sites,S.inclSkin):'--',lastNote:last&&last.note?last.note:'',dayInTx:txD?Math.round((tgtD-txD)/86400000):null,m:m,exp:exp,g:g,ev:ev,date:iso,taskId:'meas-'+m.id+'-'+iso});
        }
        if(ev.type==='treatment'&&ev.schedule_type==='fixed-days'){
          var ok=false;
          if(ev.trigger_type==='size'&&last){var b=burden(last.tumor_sites,false);var thr=parseSz(ev.trigger_value||'5x5');if(thr&&b>=thr.v1*thr.v2)ok=true;}
          else if(['age','day-after-tx','enrollment'].includes(ev.trigger_type)){ok=!!(txD&&tgtD>=txD);}
          if(ok&&(ev.schedule_days||[]).includes(dow)){
            var nd=((m.completed_events||[])).filter(function(e){return e===ev.label}).length;
            if(!ev.max_doses||nd<ev.max_doses)tasks.push({type:'treatment',mouseId:m.id,expId:exp.id,expName:exp.name,researcher:exp.researcher,group:g.name,groupColor:g.color,label:ev.label,drug:ev.drug,dose:ev.dose,route:ev.route,weight:m.weight,dayInTx:txD?Math.round((tgtD-txD)/86400000):null,m:m,exp:exp,g:g,ev:ev,date:iso,taskId:'tx-'+m.id+'-'+ev.label+'-'+iso});
          }
        }
        if((ev.type==='blood'||ev.type==='ivis')&&ev.schedule_type==='once'){
          var tgt=null;
          if(ev.trigger_type==='day-after-tx'&&txD)tgt=addD(m.tx_start,ev.day_offset||0);
          else if(ev.trigger_type==='endpoint'&&nearEP(m.id,exp.id))tgt=iso;
          var rs=(S.adhoc[iso]||[]).find(function(t){return t.original_task_key===ev.label+'-'+m.id&&!t.done});
          if(rs)tgt=rs.task_date;
          if(tgt===iso&&!(m.completed_events||[]).includes(ev.label))tasks.push({type:ev.type,mouseId:m.id,expId:exp.id,expName:exp.name,researcher:exp.researcher,group:g.name,groupColor:g.color,label:ev.label,dayInTx:txD?Math.round((tgtD-txD)/86400000):null,m:m,exp:exp,g:g,ev:ev,date:iso,taskId:ev.type+'-'+m.id+'-'+ev.label+'-'+iso});
        }
        if(ev.schedule_type==='interval'&&ev.interval_days&&txD&&tgtD>=txD){
          var ds=Math.round((tgtD-txD)/86400000);
          if(ds>0&&ds%ev.interval_days===0){var nd2=((m.completed_events||[])).filter(function(e){return e===ev.label}).length;if(!ev.max_doses||nd2<ev.max_doses)tasks.push({type:ev.type||'treatment',mouseId:m.id,expId:exp.id,expName:exp.name,researcher:exp.researcher,group:g.name,groupColor:g.color,label:ev.label,drug:ev.drug||'',dose:ev.dose||'',dayInTx:ds,m:m,exp:exp,g:g,ev:ev,date:iso,taskId:'int-'+m.id+'-'+ev.label+'-'+iso});}
        }
      });
    });
    (S.adhoc[iso]||[]).filter(function(t){return !t.original_task_key&&t.experiment_id===exp.id}).forEach(function(t){tasks.push({type:'custom',mouseId:t.mouse_id||'',expId:exp.id,expName:exp.name,label:t.description,note:t.note,done:t.done,adHocId:t.id,date:iso,taskId:'adhoc-'+t.id});});
  });
  (S.adhoc[iso]||[]).filter(function(t){return !t.original_task_key&&!t.experiment_id}).forEach(function(t){tasks.push({type:'custom',mouseId:t.mouse_id||'',expId:'',label:t.description,note:t.note,done:t.done,adHocId:t.id,date:iso,taskId:'adhoc-'+t.id});});

  // Add distress checks for post-mastectomy mice
  S.experiments.filter(function(e){return e.status==='active'&&e.is_mastectomy}).forEach(function(exp){
    (S.mice[exp.id]||[]).filter(function(m){return m.status==='active'&&m.post_mx_status==='post_mx'}).forEach(function(m){
      var mevts=(S.mevents[exp.id]||{})[m.id]||[];
      var lastChecks=mevts.filter(function(e){return e.event_type==='distress_check'}).slice(-3);
      var lastNote=lastChecks.length?lastChecks[lastChecks.length-1].label.replace('Distress check: ','').replace('Distress check: ',''):'';
      var daysMx=m.mx_date?Math.round((new Date(iso)-new Date(m.mx_date))/86400000):null;
      tasks.push({type:'distress',mouseId:m.id,expId:exp.id,expName:exp.name,researcher:exp.researcher,
        label:'Distress check',lastNote:lastNote,lastChecks:lastChecks,
        dayInTx:daysMx,m:m,exp:exp,date:iso,taskId:'dc-'+m.id+'-'+iso});
    });
  });

  // Merge same-day tumor+weight tasks for same mouse into one combined task
  var measureByMouse={};
  tasks.forEach(function(t,i){
    if(t.type==='measure'||t.type==='measure-weight'){
      var k=t.mouseId+'|'+t.expId;
      if(!measureByMouse[k])measureByMouse[k]=[];
      measureByMouse[k].push(i);
    }
  });
  var skipIdx=new Set();
  Object.keys(measureByMouse).forEach(function(k){
    var idxs=measureByMouse[k];
    if(idxs.length>1){
      // Merge into first task, mark others for removal
      var first=tasks[idxs[0]];
      first.type='measure-combined';
      first.label='Tumor + weight';
      first.combinedTypes=idxs.map(function(i){return tasks[i].type});
      for(var j=1;j<idxs.length;j++)skipIdx.add(idxs[j]);
    }
  });
  if(skipIdx.size)tasks=tasks.filter(function(t,i){return !skipIdx.has(i);});

  return tasks;
}
function sortTasks(tasks){
  if(S.sortBy==='exp')return tasks.slice().sort(function(a,b){return(a.expId||'').localeCompare(b.expId||'')||(a.type||'').localeCompare(b.type||'')});
  var o={measure:0,'measure-combined':0,'measure-weight':0,treatment:1,blood:2,ivis:3,custom:4,distress:-1};
  return tasks.slice().sort(function(a,b){return((o[a.type]!==undefined?o[a.type]:9)-(o[b.type]!==undefined?o[b.type]:9))||(a.expId||'').localeCompare(b.expId||'')});
}

// LOG FORM
var logOrder=[];
function logHTML(eid,mid,ei,viewDate){
  var msl=(S.measurements[eid]||{})[mid]||[];
  var entry=ei>=0?msl[ei]:null;
  var lastMeas=msl.length>0?msl[msl.length-1]:null;
  var defD=entry?entry.measured_at:(viewDate||TISO);
  var defN=entry?entry.note||'':'';
  var m=(S.mice[eid]||[]).find(function(x){return x.id===mid});
  var defW=m&&m.weight?m.weight:'';
  var isEdit=ei>=0;
  var templateSites=entry&&entry.tumor_sites&&entry.tumor_sites.length
    ?entry.tumor_sites
    :(lastMeas&&lastMeas.tumor_sites&&lastMeas.tumor_sites.length?lastMeas.tumor_sites:[]);

  // Build inline site columns — one compact column per tumor site
  var siteCols='';
  var nSites=Math.max(templateSites.length,1);
  if(templateSites.length>0){
    templateSites.forEach(function(site,si){
      var isSkin=site.location==='skin'||site.is_skin;
      var isGone=site.status==='gone';
      var prevSz=site.dim1&&site.dim2?site.dim1+'x'+site.dim2:'';
      siteCols+='<div class="il-g" id="sr-'+mid+'-'+si+'" style="min-width:80px">'
        +'<div class="il-l" style="color:'+(isSkin?'var(--amber)':'var(--text3)')+'">'+site.location+'</div>'
        +'<input class="il-in" id="il-sz-'+mid+'-'+si+'" value="'+(isEdit?prevSz:'')+'" style="width:72px" placeholder="7x8" tabindex="'+(si+2)+'"'+(isGone?' disabled':'')+'>'
        +'<div style="margin-top:2px"><label class="skin-chk"><input type="checkbox" class="gone-chk" data-mid="'+mid+'" data-si="'+si+'"'+(isGone?' checked':'')+'>Gone</label></div>'

function addBlankSite(mid){

function rmSiteRow(mid,si){

}

function ilToggleGone(mid,si){
  var goneEl=document.getElementById('il-gone-'+mid+'-'+si);
  // gone-chk elements use class, find by data attributes
  var chk=document.querySelector('.gone-chk[data-mid="'+mid+'"][data-si="'+si+'"]');
  var statusEl=document.getElementById('il-status-'+mid+'-'+si);
  var szEl=document.getElementById('il-sz-'+mid+'-'+si);
  if(!statusEl||!chk)return;
  if(chk.checked){
    statusEl.value='gone';
    if(szEl){szEl.value='';szEl.disabled=true;szEl.placeholder='Gone';}
  } else {
    statusEl.value='ok';
    if(szEl){szEl.disabled=false;szEl.placeholder='7x8';}
  }
}

function ilSzInput(mid,si){
  var chk=document.querySelector('.gone-chk[data-mid="'+mid+'"][data-si="'+si+'"]');
  var statusEl=document.getElementById('il-status-'+mid+'-'+si);
  if(chk)chk.checked=false;
  if(statusEl)statusEl.value='ok';
}

function getSites(mid){
  var sites=[],si=0;
  while(true){
    var szEl=document.getElementById('il-sz-'+mid+'-'+si);if(!szEl)break;
    var sz=szEl.value.trim();
    var locHid=document.getElementById('il-loc-'+mid+'-'+si);
    var locSel=document.getElementById('il-loc-sel-'+mid+'-'+si);
    var locVal=(locSel&&locSel.value)?locSel.value:(locHid?locHid.value:'');
    var isSkin=locVal==='skin';
    var skinHid=document.getElementById('il-skin-'+mid+'-'+si);
    if(!isSkin&&skinHid)isSkin=skinHid.value==='1';
    var statusEl=document.getElementById('il-status-'+mid+'-'+si);
    var status=statusEl?statusEl.value:'ok';
    if(status==='gone'){
      if(locVal)sites.push({location:locVal,dim1:0,dim2:0,is_skin:isSkin,status:'gone',sort_order:si});
    } else if(sz){
      var p=parseSz(sz);
      if(p&&locVal)sites.push({location:locVal,dim1:p.v1,dim2:p.v2,is_skin:isSkin,status:'ok',sort_order:si});
      else if(p)sites.push({location:'',dim1:p.v1,dim2:p.v2,is_skin:false,status:'ok',sort_order:si});
    }
    si++;
  }
  return sites;
}

async function submitLog(eid,mid,ei){
  var exp=S.experiments.find(function(e){return e.id===eid});
  var m=(S.mice[eid]||[]).find(function(x){return x.id===mid});
  var dv=(document.getElementById('il-d-'+mid)&&document.getElementById('il-d-'+mid).value)||TISO;
  var wStr=((document.getElementById('il-w-'+mid)&&document.getElementById('il-w-'+mid).value)||'').trim();
  var note=((document.getElementById('il-n-'+mid)&&document.getElementById('il-n-'+mid).value)||'').trim();
  var status=(document.getElementById('il-st-'+mid)&&document.getElementById('il-st-'+mid).value)||'';
  var sites=getSites(mid);
  // Allow any combination: sites only, weight only, note only, or any mix
  // Only block if truly nothing is entered
  var hasWeight=wStr&&wStr.length>0;
  var hasCage=cageVal&&cageVal.trim().length>0;
  if(!sites.length&&!note&&!hasWeight&&!hasCage){alert('Nothing to save — enter a measurement, weight, or note.');return;}
  var btn=document.querySelector('#il-'+mid+' .btn-g');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spin"></div>';}
  try{
    if(ei>=0){
      var ms=(S.measurements[eid]||{})[mid]&&(S.measurements[eid]||{})[mid][ei];
      if(ms){var msWeight2=wStr?parseFloat(wStr):null;
      await sb.from('measurements').update({measured_at:dv,note:note,edited_at:TISO,weight:msWeight2!==null?msWeight2:ms.weight}).eq('id',ms.id);await sb.from('tumor_sites').delete().eq('measurement_id',ms.id);if(sites.length)await sb.from('tumor_sites').insert(sites.map(function(s){return Object.assign({},s,{measurement_id:ms.id})}));}
    } else {
      var msWeight=wStr?parseFloat(wStr):null;
    var msD=(await sb.from('measurements').insert({mouse_id:mid,experiment_id:eid,measured_at:dv,note:note,logged_by:uname(),weight:msWeight}).select().single()).data;
      if(msD&&sites.length)await sb.from('tumor_sites').insert(sites.map(function(s){return Object.assign({},s,{measurement_id:msD.id})}));
    }
    // Only update mouse.weight when explicitly typed (used as last known weight reference)
    if(wStr){var w=parseFloat(wStr);if(!isNaN(w))await sb.from('mice').update({weight:w}).eq('id',mid);}
    var cageVal=document.getElementById('il-cage-'+mid)&&document.getElementById('il-cage-'+mid).value;
    if(cageVal!==null&&cageVal!==undefined){var m2=(S.mice[eid]||[]).find(function(x){return x.id===mid});if(m2&&cageVal!==m2.cage_number)await sb.from('mice').update({cage_number:cageVal}).eq('id',mid);}
    if(status&&ei<0){
      await sb.from('mice').update({status:'sacrificed',cause:status,sac_date:dv}).eq('id',mid);
      await sb.from('mouse_events').insert({mouse_id:mid,experiment_id:eid,event_date:dv,event_type:'sacrifice',label:'Sacrificed - '+status,logged_by:uname()});
      var kw=document.getElementById('il-kdv-'+mid);if(kw)kw.style.display='block';
      var il=document.getElementById('il-'+mid);if(il){var row=il.querySelector('.il-row');if(row)row.innerHTML='<div style="font-size:11px;color:var(--green);padding:4px 0"><i class="ti ti-check"></i> Saved. Mouse marked: '+status+'. Add KDV below.</div>';}
      await loadAll(eid);return;
    }
    if(ei<0&&S.view==='daily'){
      var idx=logOrder.indexOf(mid);
      if(idx>=0&&idx<logOrder.length-1){
        var nid=logOrder[idx+1];
        var neid=S.experiments.find(function(e){return(S.mice[e.id]||[]).find(function(mm){return mm.id===nid})});
        neid=neid?neid.id:eid;
        var cc=document.getElementById('ilc-d-'+mid);
        if(cc)cc.innerHTML='<div style="padding:3px 9px 6px;font-size:11px;color:var(--green)"><i class="ti ti-check"></i> Saved'+(sites[0]?' - '+sites[0].dim1+'x'+sites[0].dim2:'')+'</div>';
        await loadAll(eid);
        if(neid!==eid)await loadAll(neid);
        openLogD(neid,nid);return;
      }
    }
    await loadAll(eid);if(S.view==='daily')renderDaily();else renderExp(eid);
  }catch(err){alert('Error: '+err.message);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> Save';}}
}

function parseMouseIds(raw){
  // Accept newlines, commas, spaces, tabs as separators
  return raw.split(/[\n,;\s]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
}
async function enrollMice(){
  var d=S._enrollCtx;if(!d)return;
  var rawIds=document.getElementById('en-ids')&&document.getElementById('en-ids').value||'';
  var ids=parseMouseIds(rawIds);
  if(!ids.length){alert('Enter at least one mouse ID');return;}
  var en=(document.getElementById('en-date')&&document.getElementById('en-date').value)||TISO;
  var txRaw=document.getElementById('en-tx')&&document.getElementById('en-tx').value;

// DAILY
// Builds the mouse-log order matching exactly what's visually rendered in renderDaily,
// for both Type-sort and WP/cage-sort layouts. Keep in sync with renderDaily's grouping.
function isMeasureType(type){return type==='measure'||type==='measure-tumor'||type==='measure-combined'||type==='measure-weight';}
function buildVisibleLogOrder(tasks){
  var measureTasks=tasks.filter(function(t){return isMeasureType(t.type);});
  var order=[];
  function pushMice(taskList){
    var byMouse={};
    taskList.forEach(function(t){if(!byMouse[t.mouseId])byMouse[t.mouseId]=[];byMouse[t.mouseId].push(t);});
    Object.keys(byMouse).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})}).forEach(function(mid){
      if(order.indexOf(mid)===-1)order.push(mid);
    });
  }
  if(S.sortBy==='type'){
    pushMice(measureTasks);
    return order;
  }
  // WP/cage sort: mirror renderDaily's grouping exactly
  var cageToExps={};
  measureTasks.forEach(function(t){if(t.m&&t.m.cage_number){var c=t.m.cage_number;if(!cageToExps[c])cageToExps[c]=new Set();cageToExps[c].add(t.expId);}});
  var mixedCages=new Set();
  Object.keys(cageToExps).forEach(function(c){if(cageToExps[c].size>1)mixedCages.add(c);});

  var byE={};
  measureTasks.forEach(function(t){
    if(t.m&&t.m.cage_number&&mixedCages.has(t.m.cage_number))return;
    var k=t.expId||'Other';if(!byE[k])byE[k]=[];byE[k].push(t);
  });
  Object.keys(byE).sort().forEach(function(eid){
    var expTasks=byE[eid];
    var withCage=expTasks.filter(function(t){return t.m&&t.m.cage_number;});
    var noCage=expTasks.filter(function(t){return !t.m||!t.m.cage_number;});
    var byCage={};
    withCage.forEach(function(t){var c=t.m.cage_number;if(!byCage[c])byCage[c]=[];byCage[c].push(t);});
    Object.keys(byCage).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})}).forEach(function(cage){
      pushMice(byCage[cage]);
    });
    if(noCage.length)pushMice(noCage);
  });
  var mixedTasks=measureTasks.filter(function(t){return t.m&&t.m.cage_number&&mixedCages.has(t.m.cage_number);});
  if(mixedTasks.length){
    var mixByCage={};
    mixedTasks.forEach(function(t){var c=t.m.cage_number;if(!mixByCage[c])mixByCage[c]=[];mixByCage[c].push(t);});
    Object.keys(mixByCage).sort().forEach(function(cage){pushMice(mixByCage[cage]);});
  }
  return order;
}

    function mergeMiceTasks(taskList){
      var byMouse={};
      taskList.forEach(function(t){if(!byMouse[t.mouseId])byMouse[t.mouseId]=[];byMouse[t.mouseId].push(t);});
      return byMouse;

    var mixedCages2=new Set();
    Object.keys(cageToExps2).forEach(function(c){if(cageToExps2[c].size>1)mixedCages2.add(c);});

    var byE={};
    tasks.forEach(function(t){
      if(t.m&&t.m.cage_number&&mixedCages2.has(t.m.cage_number))return; // skip mixed, shown at bottom
      var k=t.expId||'Other';if(!byE[k])byE[k]=[];byE[k].push(t);

      var noCage=expTasks.filter(function(t){return !t.m||!t.m.cage_number;});

      if(noCage.length){

function wkDet(d,type,ef){
  S._rsMap=S._rsMap||[];

    tasks=tasks.filter(function(t){return t.type==='measure'||t.type==='measure-tumor'||t.type==='measure-combined'||t.type==='measure-weight';});

  var title=type==='_measure'?'Measurements':(type?TLBL2[type]||type:(ef||''));

      +'<span style="color:var(--text2);min-width:65px">'+(t.expId||'--')+'</span>'

async function archiveExp(eid){
  if(!confirm('Archive '+eid+'? It will be hidden from active lists but data is preserved.'))return;
  await sb.from('experiments').update({status:'archived'}).eq('id',eid);
  await dbLoad();renderExps();buildExpNav();
}
async function unarchiveExp(eid){
  await sb.from('experiments').update({status:'active'}).eq('id',eid);
  await dbLoad();renderExps();buildExpNav();
}
async function deleteExp(eid){
  var exp=S.experiments.find(function(e){return e.id===eid});
  if(!confirm('PERMANENTLY DELETE '+eid+' — '+( exp?exp.name:'')+' and ALL its data (mice, measurements, events)?\n\nThis cannot be undone.'))return;
  var conf=prompt('Type the WP number to confirm:','');
  if(conf!==eid){alert('WP number did not match. Nothing deleted.');return;}
  // Delete in order (FK constraints)
  var miceIds=(S.mice[eid]||[]).map(function(m){return m.id});
  if(miceIds.length){
    await sb.from('mouse_events').delete().in('mouse_id',miceIds);
    await sb.from('measurements').delete().in('mouse_id',miceIds);
    await sb.from('mice').delete().eq('experiment_id',eid);
  }
  var grpIds=(S.groups[eid]||[]).map(function(g){return g.id});
  if(grpIds.length)await sb.from('scheduled_events').delete().in('group_id',grpIds);
  await sb.from('experiment_groups').delete().eq('experiment_id',eid);
  await sb.from('adhoc_tasks').delete().eq('experiment_id',eid);
  await sb.from('deviation_log').delete().eq('experiment_id',eid);
  await sb.from('experiments').delete().eq('id',eid);
  await dbLoad();renderExps();buildExpNav();
}

// MOUSE HISTORY
function renderMouseHist(m,eid){
  var exp=S.experiments.find(function(e){return e.id===eid});
  var msl=(S.measurements[eid]||{})[m.id]||[];
  var mevts=(S.mevents[eid]||{})[m.id]||[];
  var showAll=S.showAllMs[m.id];
  var keyMs=new Set();
  if(msl.length>0)keyMs.add(msl[0].id);
  if(msl.length>1)keyMs.add(msl[msl.length-1].id);
  if(m.day0_measurement_id)keyMs.add(m.day0_measurement_id);
  var sacEvt=m.sac_date&&!mevts.find(function(e){return e.event_type==='sacrifice'})
    ?{event_date:m.sac_date,event_type:'sacrifice',label:'Sacrificed - '+(m.cause||'endpoint')+(m.kdv?' ('+m.kdv+')':''),logged_by:null}
    :null;
  var allEvts=mevts.slice();if(sacEvt)allEvts.push(sacEvt);
  var displayMs=showAll?msl:msl.filter(function(ms){return keyMs.has(ms.id)});
  var rows=[];
  displayMs.forEach(function(ms){rows.push({date:ms.measured_at,kind:'ms',data:ms});});
  allEvts.forEach(function(ev){rows.push({date:ev.event_date,kind:'ev',data:ev});});
  rows.sort(function(a,b){return a.date.localeCompare(b.date)});
  var multi=exp&&exp.multi_tumor?true:false;
  var html='<div style="padding:6px 8px;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    +'<div style="font-size:10px;font-weight:500;color:var(--text2)">History - '+m.id+(m.day0_date?' | Day 0: '+m.day0_date:' | <span style="color:var(--amber)">Day 0 not set</span>')+'</div>'
    +'<div style="display:flex;gap:4px">'
    +'<button class="btn btn-xs" onclick="S.showAllMs[\''+m.id+'\']=!S.showAllMs[\''+m.id+'\'];toggleHist(\''+eid+'\',\''+m.id+'\')">'
    +'<i class="ti ti-history"></i> '+(showAll?'Key events only':'Show all measurements')+'</button>'
    +'<button class="btn btn-xs btn-icon" title="Close" onclick="closeHist(\''+m.id+'\')" style="color:var(--text3)"><i class="ti ti-x"></i></button>'
    +'</div></div>'
    +'<div class="hw"><table class="ht"><thead><tr>'
    +'<th style="width:75px">Date</th><th style="width:60px">Type</th>'
    +'<th>'+(multi?'Sites':'Size')+'</th>'+(multi?'<th style="width:72px">Burden</th>':'')
    +'<th style="width:52px">Weight</th><th>Details / note</th>'
    +'<th style="width:55px">By</th><th style="width:95px"></th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(row){
    if(row.kind==='ms'){
      var ms=row.data;var sites=ms.tumor_sites||[];var isD0=ms.id===m.day0_measurement_id;
      var b=Math.round(burden(sites,S.inclSkin));
      var sitesHTML='';
      if(multi){sitesHTML=sites.map(function(s){
        var gone=s.status==='gone',nm=s.status==='nm';
        var szStr=gone?'<em style="color:var(--amber)">Gone</em>':nm?'<em style="color:var(--text3)">NM</em>':(s.dim1&&s.dim2?s.dim1+'x'+s.dim2:'--');
        return'<span style="font-family:var(--mono);font-size:10px'+(s.is_skin?';color:var(--text3)':'')+'">'+( s.location?s.location+' ':'')+szStr+(s.is_skin?' <em style="font-size:8px">(skin)</em>':'')+'</span>';
      }).join('<br>');}
      else{
        var s0=sites[0];
        if(s0){sitesHTML='<span class="mono">'+(s0.status==='gone'?'<em style="color:var(--amber)">Gone</em>':s0.status==='nm'?'<em style="color:var(--text3)">NM</em>':(s0.dim1&&s0.dim2?s0.dim1+'x'+s0.dim2:'--'))+'</span>';}
        else{sitesHTML='<span class="mono">--</span>';}
      }
      var msIdx=msl.indexOf(ms);
      html+='<tr class="'+(isD0?'d0-row':'')+'" id="histrow-'+ms.id+'">'
        +'<td class="mono" style="color:var(--text2)">'+ms.measured_at+(isD0?'<span class="d0-badge">Day 0</span>':'')+'</td>'
        +'<td><span class="badge bg" style="font-size:9px">measure</span></td>'
        +'<td>'+sitesHTML+'</td>'
        +(multi?'<td class="mono">'+(b?b+'mm2':'--')+'</td>':'')
        +'<td style="font-size:10px">'+(m.weight?m.weight+'g':'--')+'</td>'
        +'<td style="font-size:10px">'+(ms.note||'--')+(ms.edited_at?'<span style="font-size:9px;color:var(--text3);margin-left:4px">edited '+ms.edited_at+'</span>':'')+'</td>'
        +'<td style="font-size:10px;color:var(--text3)">'+(ms.logged_by||'--')+'</td>'
        +'<td><div style="display:flex;gap:3px">'
        +'<button class="d0-btn" onclick="setDay0(\''+m.id+'\',\''+eid+'\',\''+ms.id+'\',\''+ms.measured_at+'\')">'+(isD0?'Day 0 set':'Set day 0')+'</button>'
        +'<button class="btn btn-xs btn-icon" onclick="openLogE(\''+eid+'\',\''+m.id+'\','+msIdx+')"><i class="ti ti-pencil"></i></button>'
        +'</div></td></tr>';
    } else {
      var ev=row.data;
      var ec=ev.event_type==='transferred'?'ev-row tr':ev.event_type==='sacrifice'?'ev-row sac':'ev-row';
      var icon=EICO[ev.event_type]||'ti-point';
      var det=ev.details||{};var ds='';
      if(ev.event_type==='transferred')ds='to '+det.to_group+' | Tx: '+det.first_tx_date+' | Sched: '+det.schedule_anchor+(det.note?' | '+det.note:'');
      else if(ev.event_type==='cage_change')ds=(det.old_cage||'?')+' to '+(det.new_cage||'?');
      else if(ev.event_type==='mastectomy')ds=(det.tumor_weight_mg?'Tumor: '+det.tumor_weight_mg+'mg':'')+( det.notes?' — '+det.notes:'');
      else if(ev.event_type==='distress_check')ds=det.status==='clear'?'Clear':(det.status==='watch'?'Watch':'Endpoint')+(det.note?' — '+det.note:'');
      else if(ev.event_type==='recurrence')ds=det.note?det.note:'';
      html+='<tr class="'+ec+'">'
        +'<td class="mono">'+ev.event_date+'</td>'
        +'<td><i class="ti '+icon+'" style="font-size:12px"></i></td>'
        +'<td colspan="'+(multi?3:2)+'" style="font-weight:500">'+(ev.label||'')+'</td>'
        +'<td style="font-size:10px">'+ds+'</td>'
        +'<td style="font-size:10px;color:var(--text3)">'+(ev.logged_by||'--')+'</td>'
        +'<td></td></tr>';
    }
  });
  if(!rows.length)html+='<tr><td colspan="'+(multi?8:7)+'" style="text-align:center;padding:1rem;color:var(--text3);font-size:11px">No history yet</td></tr>';
  html+='</tbody></table></div>';
  return html;
}
function toggleHist(eid,mid){
  // Opens the history panel if closed; if already open, just refreshes content
  var tr=document.getElementById('hist-tr-'+mid);if(!tr)return;
  var m=(S.mice[eid]||[]).find(function(x){return x.id===mid});if(!m)return;
  if(tr.dataset.open==='1'){
    // Already open - just re-render (e.g. after show-all toggle)
    tr.querySelector('td').innerHTML=renderMouseHist(m,eid);
  } else {
    tr.style.display='';tr.dataset.open='1';
    tr.querySelector('td').innerHTML=renderMouseHist(m,eid);
  }
}
function closeHist(mid){
  var tr=document.getElementById('hist-tr-'+mid);if(!tr)return;
  tr.style.display='none';tr.dataset.open='0';
}

// CHARTS
var charts={};
function drawGrowth(exp,groups){
  var ctx=document.getElementById('growthChart');if(!ctx)return;
  var key='g'+exp.id;if(charts[key])charts[key].destroy();
  var miceAll=S.mice[exp.id]||[];
  var allDays=new Set();
  miceAll.forEach(function(m){
    if(!m.day0_date)return;
    ((S.measurements[exp.id]||{})[m.id]||[]).forEach(function(ms){
      if(!ms.tumor_sites||!ms.tumor_sites.some(function(s){return s.dim1}))return;
      allDays.add(Math.round((new Date(ms.measured_at)-new Date(m.day0_date))/86400000));
    });
  });
  var labs=Array.from(allDays).sort(function(a,b){return a-b});
  if(!labs.length){ctx.parentElement.innerHTML='<div class="empty">No day 0 set yet. Open mouse history and click "Set day 0" on a measurement.</div>';return;}
  var datasets=[];
  groups.forEach(function(g){
    var mice=miceAll.filter(function(m){return(m.group_id===g.id||m.group_name===g.name)&&m.day0_date&&!m.excluded_from_analysis});
    if(S.plotMode==='individual'||S.plotMode==='both'){
      mice.forEach(function(m){
        var msl=(S.measurements[exp.id]||{})[m.id]||[];
        var data=labs.map(function(rd){var td=addD(m.day0_date,rd);var ms=msl.find(function(x){return x.measured_at===td&&x.tumor_sites&&x.tumor_sites.some(function(s){return s.dim1})});return ms?Math.round(burden(ms.tumor_sites,S.inclSkin)):null;});
        if(data.some(function(v){return v!=null}))datasets.push({label:m.id,data:data,borderColor:g.color,backgroundColor:'transparent',tension:.3,fill:false,spanGaps:true,pointRadius:2,borderWidth:1.2,borderDash:[4,3]});
      });
    }
    if(S.plotMode==='mean'||S.plotMode==='both'){
      var meanD=labs.map(function(rd){
        var vals=mice.map(function(m){var td=addD(m.day0_date,rd);var ms=((S.measurements[exp.id]||{})[m.id]||[]).find(function(x){return x.measured_at===td&&x.tumor_sites&&x.tumor_sites.some(function(s){return s.dim1})});return ms?burden(ms.tumor_sites,S.inclSkin):null;}).filter(function(v){return v!=null});
        return vals.length?Math.round(vals.reduce(function(a,b){return a+b},0)/vals.length):null;
      });
      if(meanD.some(function(v){return v!=null}))datasets.push({label:g.name+' (mean)',data:meanD,borderColor:g.color,backgroundColor:g.color+'22',tension:.3,fill:false,spanGaps:true,pointRadius:4,borderWidth:2.5});
    }
  });
  if(!datasets.length){ctx.parentElement.innerHTML='<div class="empty">No data to plot. Set day 0 for mice and ensure measurements exist.</div>';return;}
  charts[key]=new Chart(ctx,{type:'line',data:{labels:labs.map(function(d){return'd'+d}),datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.raw+' mm2'}}}},scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{color:'rgba(128,128,128,0.08)'},title:{display:true,text:'Days from day 0',font:{size:9}}},y:{title:{display:true,text:'Burden (mm2)',font:{size:9}},ticks:{font:{size:9}},grid:{color:'rgba(128,128,128,0.08)'},min:0}}}});
}
function drawKM(exp,groups){
  var ctx=document.getElementById('kmChart');if(!ctx)return;
  var key='k'+exp.id;if(charts[key])charts[key].destroy();
  var isMx=exp.is_mastectomy;
  function buildKM(mice){
    // For mastectomy experiments: day 0 = mx_date, endpoint = respiratory distress sacrifice
    // For standard experiments: day 0 = tx_start
    // Skip excluded mice
    var evs=mice.map(function(m){
      if(m.excluded_from_analysis)return null;
      var day0=isMx?(m.mx_date||null):(m.tx_start||null);
      if(!day0)return null;
      var eD=m.sac_date?new Date(m.sac_date):TODAY;
      return{days:Math.round((eD-new Date(day0))/86400000),event:m.cause==='endpoint'?1:0};
    }).filter(Boolean).sort(function(a,b){return a.days-b.days});
    var s=1,n=evs.length;var pts=[{x:0,y:1}];
    evs.forEach(function(e,i){if(e.event===1)s*=(n-i-1)/(n-i);pts.push({x:e.days,y:Math.max(0,s)});});
    return pts;
  }
  var datasets=groups.map(function(g){
    var mice=(S.mice[exp.id]||[]).filter(function(m){return m.group_name===g.name||m.group_id===g.id});
    if(!mice.length)return null;
    return{label:g.name,data:buildKM(mice),borderColor:g.color,backgroundColor:'transparent',stepped:'before',tension:0,fill:false,pointRadius:0,borderWidth:2};
  }).filter(Boolean);
  if(!datasets.length){ctx.parentElement.innerHTML='<div class="empty">No survival data yet</div>';return;}
  charts[key]=new Chart(ctx,{type:'line',data:{datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{type:'linear',title:{display:true,text:isMx?'Days from mastectomy':'Days from tx start',font:{size:9}},ticks:{font:{size:9}},grid:{color:'rgba(128,128,128,0.08)'}},y:{min:0,max:1,title:{display:true,text:'Survival',font:{size:9}},ticks:{font:{size:9},callback:function(v){return Math.round(v*100)+'%'}},grid:{color:'rgba(128,128,128,0.08)'}}}}});
}

function renderNGGroups(){
  return NG.map(function(g,gi){
    return '<div class="grp-blk">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">'
      +'<div style="display:flex;align-items:center;gap:7px">'
      +'<div class="edot" style="background:'+g.color+'"></div>'
      +'<input class="fi" value="'+g.name+'" style="width:185px;font-size:11px;padding:3px 6px" oninput="NG['+gi+'].name=this.value">'
      +'<span style="font-size:10px;color:var(--text2)">N:</span>'
      +'<input class="fi" type="number" value="'+g.n+'" style="width:48px;font-size:11px;padding:3px 5px" oninput="NG['+gi+'].n=parseInt(this.value)||0">'
      +'</div>'
      +(gi>0?'<button class="btn btn-xs" onclick="NG.splice('+gi+',1);document.getElementById(\'ng-cont\').innerHTML=renderNGGroups()"><i class="ti ti-trash"></i></button>':'')
      +'</div>'
      +g.events.map(function(ev,ei){return renderNGEvent(gi,ei,ev)}).join('')
      +'<div style="display:flex;gap:5px;margin-top:3px">'
      +'<button class="btn btn-xs" onclick="addNGEvent('+gi+')"><i class="ti ti-plus"></i> Add event</button>'
      +'<button class="btn btn-xs" onclick="duplicateNG('+gi+')"><i class="ti ti-copy"></i> Duplicate group</button>'
      +'</div>'
      +'</div>';
  }).join('');
}
function renderNGEvent(gi,ei,ev){
  // Type definitions: which fields each type needs
  var ALL_TYPES=['measure-tumor','measure-weight','treatment','blood','ivis','custom'];
  var TYPE_LABELS={'measure-tumor':'Tumor measure','measure-weight':'Weight','treatment':'Treatment','blood':'Blood draw','ivis':'IVIS','custom':'Custom'};
  // Default triggers per type
  var DEFAULT_TRIGGERS={'measure-tumor':'enrollment','measure-weight':'enrollment','treatment':'size','blood':'day-after-tx','ivis':'day-after-tx','custom':'enrollment'};
  var HAS_DRUG=ev.type==='treatment';
  var HAS_DOSE=ev.type==='treatment';
  var HAS_MAXDOSE=ev.type==='treatment';
  var HAS_DAYOFFSET=ev.type==='blood'||ev.type==='ivis';
  var HAS_DAYS=ev.type!=='once';
  var TRIGGERS_FOR_TYPE={
    'measure-tumor':['enrollment','size'],
    'measure-weight':['enrollment','day-after-tx'],
    treatment:['size','day-after-tx','enrollment'],
    blood:['day-after-tx','endpoint','enrollment'],
    ivis:['day-after-tx','endpoint','enrollment'],
    custom:['enrollment','day-after-tx']
  };
  var validTriggers=TRIGGERS_FOR_TYPE[ev.type]||['enrollment'];
  var curTrigger=validTriggers.includes(ev.trigger)?ev.trigger:validTriggers[0];

  var typeSel=ALL_TYPES.map(function(t){
    var sc=ev.type===t?'sel-'+t.replace('-',''):'';
    return'<span class="ec '+(ev.type===t?'sel-'+ev.type.split('-')[0]:'')+'" style="'+(ev.type===t?'font-weight:500':'')+'" onclick="NG['+gi+'].events['+ei+'].type=\''+t+'\';NG['+gi+'].events['+ei+'].trigger=\''+DEFAULT_TRIGGERS[t]+'\';document.getElementById(\'ng-cont\').innerHTML=renderNGGroups()">'+TYPE_LABELS[t]+'</span>';
  }).join('');

  var dayPicker=ev.schedule!=='once'?[1,2,3,4,5].map(function(d){
    return'<span class="day-btn '+(ev.days&&ev.days.includes(d)?'sel':'')+'" onclick="toggleNGDay('+gi+','+ei+','+d+')">'+DOW[d]+'</span>';
  }).join(''):'';

  var trigOpts=validTriggers.map(function(t){
    return'<option value="'+t+'"'+(curTrigger===t?' selected':'')+'>'+t+'</option>';
  }).join('');

  return '<div class="ev-blk">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<div style="display:flex;gap:3px;flex-wrap:wrap">'+typeSel+'</div>'
    +(ei>0?'<button class="btn btn-xs btn-icon" onclick="NG['+gi+'].events.splice('+ei+',1);document.getElementById(\'ng-cont\').innerHTML=renderNGGroups()"><i class="ti ti-x"></i></button>':'')
    +'</div>'
    +'<div class="f2" style="margin-bottom:5px">'
    // Label always shown
    +'<div class="fg"><label class="fl">Label</label><input class="fi" style="font-size:10px;padding:3px 5px" value="'+(ev.label||'')+'" placeholder="e.g. '+TYPE_LABELS[ev.type]+'" oninput="NG['+gi+'].events['+ei+'].label=this.value"></div>'
    // Drug / dose / route — treatment only
    +(HAS_DRUG?'<div class="fg"><label class="fl">Drug / dose / route</label><div style="display:flex;gap:3px">'
      +'<input class="fi" style="flex:2;font-size:10px;padding:3px 5px" value="'+(ev.drug||'')+'" placeholder="drug" oninput="NG['+gi+'].events['+ei+'].drug=this.value">'
      +'<input class="fi" style="flex:1;font-size:10px;padding:3px 4px" value="'+(ev.dose||'')+'" placeholder="dose" oninput="NG['+gi+'].events['+ei+'].dose=this.value">'
      +'<select class="fs" style="flex:1;font-size:10px;padding:3px 3px" onchange="NG['+gi+'].events['+ei+'].route=this.value"><option'+(ev.route==='IP'?' selected':'')+'>IP</option><option'+(ev.route==='IV'?' selected':'')+'>IV</option><option'+(ev.route==='SC'?' selected':'')+'>SC</option><option'+(ev.route==='PO'?' selected':'')+'>PO</option></select>'
      +'</div></div>':'<div></div>')
    +'</div>'
    // Schedule
    +'<div style="margin-bottom:5px"><div class="fl" style="margin-bottom:3px">Schedule</div>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
    +(dayPicker?'<div>'+dayPicker+'</div>':'')
    +'<select class="fs" style="font-size:10px;padding:3px 5px" onchange="NG['+gi+'].events['+ei+'].schedule=this.value;document.getElementById(\'ng-cont\').innerHTML=renderNGGroups()">'
    +'<option value="fixed-days"'+(ev.schedule==='fixed-days'?' selected':'')+'>Fixed days</option>'
    +'<option value="interval"'+(ev.schedule==='interval'?' selected':'')+'>Every N days</option>'
    +'<option value="once"'+(ev.schedule==='once'?' selected':'')+'>Once only</option>'
    +'</select>'
    +(ev.schedule==='interval'?'<div style="display:flex;align-items:center;gap:3px"><span class="fl">Every</span><input class="fi" type="number" min="1" style="width:52px;font-size:10px;padding:3px 5px" value="'+(ev.intervalDays||7)+'" oninput="NG['+gi+'].events['+ei+'].intervalDays=parseInt(this.value)||7"><span class="fl">days</span></div>':'')
    +'</div></div>'
    // Trigger + conditional extras
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end">'
    +'<div class="fg"><label class="fl">Start trigger</label>'
    +'<select class="fs" style="font-size:10px;padding:3px 5px" onchange="NG['+gi+'].events['+ei+'].trigger=this.value;document.getElementById(\'ng-cont\').innerHTML=renderNGGroups()">'+trigOpts+'</select></div>'
    +(curTrigger==='size'?'<div class="fg"><label class="fl">Min size</label><input class="fi" style="width:72px;font-size:10px;padding:3px 5px" value="'+(ev.triggerVal||'3x3')+'" placeholder="3x3 mm" oninput="NG['+gi+'].events['+ei+'].triggerVal=this.value"></div>':'')
    +(curTrigger==='age'?'<div class="fg"><label class="fl">Age</label><input class="fi" style="width:80px;font-size:10px;padding:3px 5px" value="'+(ev.triggerVal||'')+'" placeholder="14 weeks" oninput="NG['+gi+'].events['+ei+'].triggerVal=this.value"></div>':'')
    +(curTrigger==='day-after-tx'?'<div class="fg"><label class="fl">Day offset</label><input class="fi" type="number" style="width:65px;font-size:10px;padding:3px 5px" value="'+(ev.dayOffset||0)+'" oninput="NG['+gi+'].events['+ei+'].dayOffset=parseInt(this.value)||0"></div>':'')
    +(HAS_MAXDOSE?'<div class="fg"><label class="fl">Max doses</label><input class="fi" type="number" style="width:60px;font-size:10px;padding:3px 5px" value="'+(ev.maxDoses||'')+'" placeholder="unlimited" oninput="NG['+gi+'].events['+ei+'].maxDoses=this.value?parseInt(this.value):null"></div>':'')
    +'</div></div>';
}

function toggleNGDay(gi,ei,d){var ev=NG[gi].events[ei];if(!ev.days)ev.days=[];var idx=ev.days.indexOf(d);if(idx>=0)ev.days.splice(idx,1);else ev.days.push(d);document.getElementById('ng-cont').innerHTML=renderNGGroups();}
function addNG(){NG.push({name:'Group '+(NG.length+1),n:8,color:COLS[NG.length%COLS.length],events:[{type:'measure-tumor',label:'Tumor measurement',schedule:'fixed-days',days:[1,4],trigger:'enrollment',triggerVal:'',dayOffset:0,maxDoses:null,drug:'',dose:'',route:'IP',intervalDays:7},{type:'treatment',label:'',drug:'',dose:'',route:'IP',schedule:'fixed-days',days:[1,4],trigger:'size',triggerVal:'3x3',dayOffset:0,maxDoses:null,intervalDays:7}]});document.getElementById('ng-cont').innerHTML=renderNGGroups();}
function duplicateNG(gi){
  var src=NG[gi];
  var copy=JSON.parse(JSON.stringify(src));
  copy.name=src.name+' (copy)';
  copy.color=COLS[NG.length%COLS.length];
  NG.push(copy);
  document.getElementById('ng-cont').innerHTML=renderNGGroups();
}
function addNGEvent(gi){NG[gi].events.push({type:'treatment',label:'',drug:'',dose:'',route:'IP',schedule:'fixed-days',days:[1,4],trigger:'size',triggerVal:'3x3',dayOffset:0,maxDoses:null,intervalDays:7});document.getElementById('ng-cont').innerHTML=renderNGGroups();}
async function createExp(){
  var wp=((document.getElementById('nwp')&&document.getElementById('nwp').value)||'').trim();
  var resRaw=(document.getElementById('nres')&&document.getElementById('nres').value)||'';
  var resParts=resRaw.split('|');
  var resId=resParts[0]||null;
  var resCode=resParts[1]||'';
  var resName=resParts[2]||'';
  var tit=((document.getElementById('ntit')&&document.getElementById('ntit').value)||'').trim();
  if(!wp||!resId||!tit){alert('Fill WP number, researcher, and title');return;}
  var multi=true; // all experiments support multi-site
  var isMx=!!(document.getElementById('nmx')&&document.getElementById('nmx').checked);
  var btn=document.querySelector('button[onclick="createExp()"]');if(btn)btn.disabled=true;
  var result=await sb.from('experiments').insert({id:wp,name:tit,researcher:res,color:COLS[S.experiments.length%COLS.length],model:(document.getElementById('nmod')&&document.getElementById('nmod').value)||'',strain:(document.getElementById('nstr')&&document.getElementById('nstr').value)||'',is_mastectomy:isMx,researcher_id:resId,researcher:resName,started:TISO,status:'active',multi_tumor:multi,endpoint_criterion:(document.getElementById('nep')&&document.getElementById('nep').value)||'',harvest:(document.getElementById('nhar')&&document.getElementById('nhar').value)||''});
  if(result.error){alert('Error: '+result.error.message);if(btn)btn.disabled=false;return;}
  for(var i=0;i<NG.length;i++){
    var g=NG[i];
    var gResult=await sb.from('experiment_groups').insert({experiment_id:wp,name:g.name,color:g.color,target_n:g.n,sort_order:i}).select().single();
    if(gResult.error||!gResult.data)continue;
    var gD=gResult.data;
    for(var j=0;j<g.events.length;j++){
      var ev=g.events[j];
      await sb.from('scheduled_events').insert({group_id:gD.id,experiment_id:wp,type:ev.type,label:ev.label||'',drug:ev.drug||'',dose:ev.dose||'',route:ev.route||'',schedule_type:ev.schedule,schedule_days:ev.days||[],interval_days:ev.schedule==='interval'?ev.intervalDays:null,trigger_type:ev.trigger,trigger_value:ev.triggerVal||'',day_offset:ev.dayOffset||0,max_doses:ev.maxDoses||null,sort_order:j});
    }
  }
  await assignCageSlot(wp);await assignCageSlot(wp);await dbLoad();buildExpNav();S.expTab='mice';go('exp-'+wp);
}

async function saveEditExp(eid){
  if(!eid)eid=S._editExpId;
  var resRawE=(document.getElementById('ee-res')&&document.getElementById('ee-res').value)||'';
  var resPartsE=resRawE.split('|');
  var resIdE=resPartsE[0]||null;
  var resNameE=resPartsE[2]||resRawE;
  var mod=(document.getElementById('ee-mod')&&document.getElementById('ee-mod').value)||'';
  var ep=(document.getElementById('ee-ep')&&document.getElementById('ee-ep').value)||'';
  var har=(document.getElementById('ee-har')&&document.getElementById('ee-har').value)||'';
  var str=(document.getElementById('ee-str')&&document.getElementById('ee-str').value)||'';
  var status=(document.getElementById('ee-status')&&document.getElementById('ee-status').value)||'active';
  var isMx2=!!(document.getElementById('ee-mx')&&document.getElementById('ee-mx').checked);
  var oldExp=S.experiments.find(function(e){return e.id===eid});
  var harChanged=oldExp&&har.trim()&&har.trim()!==(oldExp.harvest||'').trim()&&oldExp.harvest;
  var upd={researcher:resNameE,researcher_id:resIdE,model:mod,endpoint_criterion:ep,harvest:har,strain:str,status:status,is_mastectomy:isMx2};
  if(harChanged)upd.harvest_updated_at=TISO;
  await sb.from('experiments').update(upd).eq('id',eid);
  if(harChanged)await sb.from('deviation_log').insert({experiment_id:eid,mouse_id:null,event_type:'harvest_change',original_date:TISO,actual_date:TISO,reason:'Harvest changed by '+uname()+' on '+TISO+'\nOLD: '+(oldExp.harvest||'')+'\nNEW: '+har});
  closeModal();await loadAll(eid);renderExp(eid);
}

async function submitDistressCheck(){

  var label=status==='clear'?'Distress check: clear':status==='watch'?'Distress check: watch'+(note?' — '+note:''):'Respiratory distress endpoint';
  await sb.from('mouse_events').insert({
    mouse_id:d.mid,experiment_id:d.eid,event_date:dcDate,
    event_type:'distress_check',label:label,
    details:{status:status,note:note},logged_by:uname()

// EXCEL EXPORT
function exportExcel(eid){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded. Please refresh.');return;}
  var exp=S.experiments.find(function(e){return e.id===eid});
  if(!exp){return;}
  var mice=S.mice[eid]||[];
  var groups=S.groups[eid]||[];
  var wb=XLSX.utils.book_new();

  // Collect all measurement dates
  var allDates=new Set();
  mice.forEach(function(m){((S.measurements[eid]||{})[m.id]||[]).forEach(function(ms){allDates.add(ms.measured_at);});});
  var sortedDates=Array.from(allDates).sort();

  // Sheet 1: Group summary (means per date)
  var s1=[['Group','Date','N','Mean burden excl skin (mm2)','SEM','Mean weight (g)','Mouse IDs']];
  groups.forEach(function(g){
    var gMice=mice.filter(function(m){return m.group_name===g.name||m.group_id===g.id});
    sortedDates.forEach(function(date){
      var vals=[],weights=[],ids=[];
      gMice.forEach(function(m){
        var ms=((S.measurements[eid]||{})[m.id]||[]).find(function(x){return x.measured_at===date});
        if(ms&&ms.tumor_sites&&ms.tumor_sites.some(function(s){return s.dim1})){
          vals.push(burden(ms.tumor_sites,false));
          ids.push(m.id);
          if(m.weight)weights.push(m.weight);
        }
      });
      if(!vals.length)return;
      var mean=vals.reduce(function(a,b){return a+b},0)/vals.length;
      var sem=vals.length>1?Math.sqrt(vals.reduce(function(s,v){return s+Math.pow(v-mean,2)},0)/(vals.length-1))/Math.sqrt(vals.length):0;
      var wm=weights.length?Math.round(weights.reduce(function(a,b){return a+b},0)/weights.length*10)/10:'';
      s1.push([g.name,date,vals.length,Math.round(mean*10)/10,Math.round(sem*10)/10,wm,ids.join(', ')]);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'Summary');

  // Sheet 2: Per mouse wide (burden per date as columns)
  var h2=['Mouse ID','Group','Cage','Enrolled','Tx start','Day0','Genotype','Status','Sac date','KDV'];
  sortedDates.forEach(function(d){h2.push('Burden '+d+' (mm2)');});
  sortedDates.forEach(function(d){h2.push('Weight '+d+' (g)');});
  var s2=[h2];
  groups.forEach(function(g){
    mice.filter(function(m){return m.group_name===g.name||m.group_id===g.id}).forEach(function(m){
      var row=[m.id,g.name,m.cage_number||'',m.enrolled||'',m.tx_start||'',m.day0_date||'',m.genotype||'',m.status,m.sac_date||'',m.kdv||''];
      sortedDates.forEach(function(date){
        var ms=((S.measurements[eid]||{})[m.id]||[]).find(function(x){return x.measured_at===date});
        row.push(ms&&ms.tumor_sites&&ms.tumor_sites.some(function(s){return s.dim1})?Math.round(burden(ms.tumor_sites,false)*10)/10:'');
      });
      sortedDates.forEach(function(date){
        var ms=((S.measurements[eid]||{})[m.id]||[]).find(function(x){return x.measured_at===date});
        // Only export explicitly recorded weight — never fall back to stored mouse weight
        row.push(ms&&ms.weight?ms.weight:'');
      });
      s2.push(row);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'Per mouse (wide)');

  // Sheet 3: Raw measurements long format
  var s3=[['Mouse ID','Group','Date','Day in tx','Burden excl skin','Burden incl skin','N sites','Sites','Weight','Note','Logged by']];
  groups.forEach(function(g){
    mice.filter(function(m){return m.group_name===g.name||m.group_id===g.id}).forEach(function(m){
      ((S.measurements[eid]||{})[m.id]||[]).forEach(function(ms){
        var sites=ms.tumor_sites||[];
        var detail=sites.map(function(s){return(s.location?s.location+' ':'')+s.dim1+'x'+s.dim2+(s.is_skin?'(skin)':'')+(s.status==='gone'?'(Gone)':'');}).join('+');
        var dt=m.tx_start?Math.round((new Date(ms.measured_at)-new Date(m.tx_start))/86400000):'';
        s3.push([m.id,g.name,ms.measured_at,dt,Math.round(burden(sites,false)*10)/10,Math.round(burden(sites,true)*10)/10,sites.length,detail,ms.weight||'',ms.note||'',ms.logged_by||'']);
      });
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),'Raw measurements');

  // Sheet 4: Survival data
  var s4=[['Mouse ID','Group','Tx start','Mx date','Sac date','Days tx->sac','Days Mx->sac','Endpoint (1=yes)','Cause','KDV','Excluded','Exclusion reason']];
  groups.forEach(function(g){
    mice.filter(function(m){return m.group_name===g.name||m.group_id===g.id}).forEach(function(m){
      var dtx=m.tx_start&&m.sac_date?Math.round((new Date(m.sac_date)-new Date(m.tx_start))/86400000):'';
      var dmx=m.mx_date&&m.sac_date?Math.round((new Date(m.sac_date)-new Date(m.mx_date))/86400000):'';
      s4.push([m.id,g.name,m.tx_start||'',m.mx_date||'',m.sac_date||'',dtx,dmx,m.cause==='endpoint'?1:0,m.cause||'',m.kdv||'',m.excluded_from_analysis?1:0,m.exclusion_reason||'']);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s4),'Survival data');

  // Auto column widths
  wb.SheetNames.forEach(function(name){
    var ws=wb.Sheets[name];
    if(!ws['!ref'])return;
    var range=XLSX.utils.decode_range(ws['!ref']);
    var cols=[];
    for(var c=range.s.c;c<=range.e.c;c++){
      var w=10;
      for(var r=range.s.r;r<=range.e.r;r++){
        var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
        if(cell&&cell.v)w=Math.min(40,Math.max(w,String(cell.v).length+2));
      }
      cols.push({wch:w});
    }
    ws['!cols']=cols;
  });

  XLSX.writeFile(wb,eid+'_'+TISO+'.xlsx');
}

// CAGE MANAGEMENT HELPERS
function getUserCode(userId){
  var u=S.users.find(function(x){return x.id===userId});
  return u&&u.code?u.code:'??';
}
function getResearcherForExp(eid){
  var exp=S.experiments.find(function(e){return e.id===eid});
  if(!exp)return null;
  if(exp.researcher_id){var u=S.users.find(function(x){return x.id===exp.researcher_id});return u||null;}
  return null;
}
function getResearcherCode(eid){
  var u=getResearcherForExp(eid);
  return u&&u.code?u.code:'??';
}
function getCageSlot(eid){
  var exp=S.experiments.find(function(e){return e.id===eid});
  return exp&&exp.researcher_cage_slot?exp.researcher_cage_slot:1;
}
function getCagePrefix(eid){
  // TL + slot (1-9) + 'xx' — e.g. TL1xx means prefix "TL1"
  var code=getResearcherCode(eid);
  var slot=getCageSlot(eid);
  return code+slot;
}
function suggestNextCage(eid){
  // Find highest cage number with this prefix, suggest next
  var prefix=getCagePrefix(eid);
  var allCages=[];
  S.experiments.forEach(function(exp){
    (S.mice[exp.id]||[]).forEach(function(m){
      if(m.cage_number&&m.cage_number.indexOf(prefix)===0)allCages.push(m.cage_number);
    });
  });
  if(!allCages.length)return prefix+'01';
  var nums=allCages.map(function(c){return parseInt(c.slice(prefix.length))||0}).filter(function(n){return!isNaN(n)});
  var maxN=nums.length?Math.max.apply(null,nums):0;
  return prefix+String(maxN+1).padStart(2,'0');
}
function getOccupiedCagesInExp(eid){
  // Returns [{cage, group, count, mice}] for all occupied cages in this experiment
  var byC={};
  (S.mice[eid]||[]).filter(function(m){return m.status==='active'&&m.cage_number}).forEach(function(m){
    if(!byC[m.cage_number])byC[m.cage_number]={cage:m.cage_number,group:m.group_name,mice:[]};
    byC[m.cage_number].mice.push(m);
  });
  return Object.values(byC).sort(function(a,b){return a.cage.localeCompare(b.cage,undefined,{numeric:true})});
}
function getOccupiedCagesOtherExps(eid){
  // Returns cages from other active experiments (for cross-exp transfer)
  var byC={};
  S.experiments.filter(function(e){return e.status==='active'&&e.id!==eid}).forEach(function(exp){
    (S.mice[exp.id]||[]).filter(function(m){return m.status==='active'&&m.cage_number}).forEach(function(m){
      if(!byC[m.cage_number])byC[m.cage_number]={cage:m.cage_number,expId:exp.id,expName:exp.name,mice:[]};
      byC[m.cage_number].mice.push(m);
    });
  });
  return Object.values(byC).sort(function(a,b){return a.cage.localeCompare(b.cage,undefined,{numeric:true})});
}
async function assignCageSlot(eid){
  // Auto-assign lowest available slot for this researcher
  var exp=S.experiments.find(function(e){return e.id===eid});
  if(!exp||!exp.researcher_id)return;
  // Find all slots used by this researcher's active experiments
  var usedSlots=S.experiments
    .filter(function(e){return e.researcher_id===exp.researcher_id&&e.status==='active'&&e.id!==eid&&e.researcher_cage_slot})
    .map(function(e){return e.researcher_cage_slot});
  // Find lowest available slot 1-9
  var slot=1;
  while(usedSlots.includes(slot)&&slot<10)slot++;
  await sb.from('experiments').update({researcher_cage_slot:slot}).eq('id',eid);
  exp.researcher_cage_slot=slot;
  return slot;
}

    +'<input class="fi" id="tr-cage-val" value="'+(m.cage_number||'')+'" style="width:90px;font-size:11px" placeholder="none">'
    +'<button class="btn btn-xs" onclick="clearCagePill()">Clear</button>'

    +'<div style="font-size:11px;font-weight:500;margin-bottom:6px">Group (optional)</div>'
    +'<div class="f2">'

    +'<div class="fg"><label class="fl">Transfer date</label><input class="fi" id="tr-date" type="date" value="'+TISO+'"></div>'
    +'<div class="fg"><label class="fl">Tx start date</label><input class="fi" id="tr-tx" type="date" value="'+TISO+'"></div>'

function selectCagePill(btn){
  document.querySelectorAll('.cage-pill').forEach(function(b){b.classList.remove('btn-p');});
  btn.classList.add('btn-p');
  var cageIn=document.getElementById('tr-cage-val');if(cageIn)cageIn.value=btn.dataset.cage;
}
function clearCagePill(){
  document.querySelectorAll('.cage-pill').forEach(function(b){b.classList.remove('btn-p');});
  var cageIn=document.getElementById('tr-cage-val');if(cageIn)cageIn.value='';
}

function toggleOtherCages(){
  var panel=document.getElementById('other-cages-panel');
  if(panel)panel.style.display=panel.style.display==='none'?'block':'none';
}

function filterOtherCages(eid){
  var q=(document.getElementById('cage-search')&&document.getElementById('cage-search').value||'').toLowerCase();
  var other=getOccupiedCagesOtherExps(eid);
  var list=document.getElementById('other-cages-list');if(!list)return;
  var filtered=q?other.filter(function(c){return c.cage.toLowerCase().indexOf(q)>=0;}):other;
  list.innerHTML=filtered.slice(0,20).map(function(c){
    return '<button class="btn btn-xs cage-pill" data-cage="'+c.cage+'" onclick="selectCagePill(this)" style="margin:2px">'
      +c.cage+' <span style="font-size:9px;opacity:.7">'+c.expId+' · '+c.mice.length+' mice</span></button>';
  }).join('')||'<div style="font-size:10px;color:var(--text3)">No cages found</div>';
}

async function submitCageTransfer(){
  var d=S._cageCtx;if(!d)return;
  var eid=d.eid,mid=d.mid;
  var m=(S.mice[eid]||[]).find(function(x){return x.id===mid});
  var newCage=(document.getElementById('tr-cage-val')&&document.getElementById('tr-cage-val').value||'').trim();
  var gv=(document.getElementById('tr-grp')&&document.getElementById('tr-grp').value)||'';
  var td=(document.getElementById('tr-date')&&document.getElementById('tr-date').value)||TISO;
  var txs=(document.getElementById('tr-tx')&&document.getElementById('tr-tx').value)||TISO;
  var sched=(document.getElementById('tr-sched')&&document.getElementById('tr-sched').value)||TISO;
  var note=(document.getElementById('tr-note')&&document.getElementById('tr-note').value)||'';

  var updates={};
  var events=[];
  var cageChanged=newCage&&newCage!==m.cage_number;
  var groupChanged=gv&&gv!=='';

  // Apply cage change
  if(cageChanged){updates.cage_number=newCage;}
  
  // Apply group change
  if(groupChanged){
    var parts=gv.split('|'),ngid=parts[0],ngname=parts[1];
    updates.group_id=ngid;updates.group_name=ngname;
    updates.tx_start=txs;
    updates.original_group_id=m.group_id;
    updates.original_group_name=m.group_name;
    events.push({mouse_id:mid,experiment_id:eid,event_date:td,event_type:'transferred',
      label:'Transferred by '+uname()+': '+m.group_name+' to '+ngname+(cageChanged?' · cage '+m.cage_number+' to '+newCage:''),
      details:{from_group:m.group_name,to_group:ngname,from_cage:m.cage_number,to_cage:newCage||m.cage_number,first_tx_date:txs,schedule_anchor:sched,note:note},
      logged_by:uname()});
    if(txs)events.push({mouse_id:mid,experiment_id:eid,event_date:txs,event_type:'tx_start',label:'Treatment started',details:{schedule_anchor:sched},logged_by:uname()});
  } else if(cageChanged){
    events.push({mouse_id:mid,experiment_id:eid,event_date:td,event_type:'cage_change',
      label:'Cage: '+(m.cage_number||'none')+' to '+newCage,
      details:{old_cage:m.cage_number,new_cage:newCage},logged_by:uname()});
  } else if(!cageChanged&&!groupChanged){
    closeModal();return;
  }

  if(Object.keys(updates).length)await sb.from('mice').update(updates).eq('id',mid);
  if(events.length)await sb.from('mouse_events').insert(events);

  closeModal();await loadAll(eid);renderExp(eid);
}

async function submitBulkCage(){
  var d=S._cageCtx;if(!d||!d.mids)return;
