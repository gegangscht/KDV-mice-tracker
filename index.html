}

function buildPrintHTML(){
  // Requires renderDaily to have been called (tasks, distressTasks in scope via closure won't work)
  // So we rebuild tasks here
  var viewDate=S.dailyDate||TISO;
  var rawAll=getTasksForDate(viewDate);
  var distressTasks=rawAll.filter(function(t){return t.type==='distress';});
  var tasks=rawAll.filter(function(t){return t.type!=='distress';});
var today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var todayTasks=tasks; // already sorted/filtered for this view

  var phtml='';
  phtml+='<div style="font-size:12px;font-weight:700;margin-bottom:8px;border-bottom:1.5px solid #000;padding-bottom:3px;page-break-after:avoid;break-after:avoid">Daily sheet — '+today+'</div>';

  // Build cage→tasks map same way as daily view
  var ptCageToExps={};
  todayTasks.forEach(function(t){if(t.m&&t.m.cage_number){var c=t.m.cage_number;if(!ptCageToExps[c])ptCageToExps[c]=new Set();ptCageToExps[c].add(t.expId);}});
  var ptMixedCages=new Set();
  Object.keys(ptCageToExps).forEach(function(c){if(ptCageToExps[c].size>1)ptMixedCages.add(c);});

  // Group tasks by WP (excluding mixed cages)
  var ptByExp={};
  todayTasks.forEach(function(t){
    if(t.m&&t.m.cage_number&&ptMixedCages.has(t.m.cage_number))return;
    var k=t.expId||'Other';if(!ptByExp[k])ptByExp[k]=[];ptByExp[k].push(t);
  });

  // Site locations for a set of mice (for column headers)
  function getSiteLocs(miceList,expId){
    var locs=[];
    miceList.forEach(function(m){
      var last=lastMs(m.id,expId);
      if(last&&last.tumor_sites)last.tumor_sites.forEach(function(s){if(s.location&&!locs.includes(s.location))locs.push(s.location);});
    });
    return locs;
  }

  // Render a table of mice (used per cage or per no-cage section)
  function printMiceTable(miceList,taskMap,expId,siteLocs){
    if(!miceList.length)return'';
    var multiSite=siteLocs.length>1;
    var h='<table style="width:100%;border-collapse:collapse;font-size:8.5px;margin-bottom:0">';
    h+='<thead><tr style="border-bottom:1px solid #000">'
      +'<th style="text-align:left;padding:1px 3px;width:55px">Mouse</th>'
      +'<th style="text-align:left;padding:1px 3px;width:55px">Group</th>'
      +'<th style="text-align:left;padding:1px 3px;width:28px">Day</th>'
      +'<th style="text-align:left;padding:1px 3px;width:110px">Task today</th>';
    if(multiSite){
      siteLocs.forEach(function(loc){h+='<th style="text-align:center;padding:1px 3px;width:48px">'+loc+'<br><span style="font-weight:400;font-size:7px">prev→new</span></th>';});
    } else {
      h+='<th style="text-align:center;padding:1px 3px;width:55px">Size<br><span style="font-weight:400;font-size:7px">prev→new</span></th>';
    }
    h+='<th style="text-align:center;padding:1px 3px;width:38px">Weight<br><span style="font-weight:400;font-size:7px">prev→___</span></th>'
      +'<th style="text-align:left;padding:1px 3px">Note</th>'
      +'</tr></thead><tbody>';

    miceList.forEach(function(m,mi){
      var last=lastMs(m.id,expId);
      var days=dInTx(m);
      var mTasks=(taskMap[m.id]||[]);
      // Build task text
      var taskParts=[];
      mTasks.forEach(function(t){
        if(t.type==='measure'||t.type==='measure-tumor')taskParts.push('Measure tumor');
        else if(t.type==='measure-weight')taskParts.push('Measure weight');
        else if(t.type==='measure-combined')taskParts.push('Measure tumor+weight');
        else if(t.type==='treatment')taskParts.push((t.dose?t.dose+' ':'')+( t.route||'')+(t.label?' ('+t.label+')':''));
        else if(t.type==='blood')taskParts.push('Blood draw');
        else if(t.type==='ivis')taskParts.push('IVIS');
        else taskParts.push(t.label||t.type);
      });
      var taskText=taskParts.join(' + ')||(mTasks.length?mTasks[0].label:'—');
      var bg=mi%2===0?'#fff':'#f5f5f5';
      h+='<tr style="border-bottom:.5px solid #ddd;background:'+bg+'">'
        +'<td style="padding:2px 3px;font-family:monospace;font-size:8px">'+m.id+'</td>'
        +'<td style="padding:2px 3px;font-size:7.5px">'+(m.group_name||'')+'</td>'
        +'<td style="padding:2px 3px">'+(days!=null?'d'+days:'')+'</td>'
        +'<td style="padding:2px 3px;font-size:8px">'+taskText+'</td>';
      if(multiSite){
        siteLocs.forEach(function(loc){
          var ps2=last&&last.tumor_sites?last.tumor_sites.find(function(s){return s.location===loc}):null;
          var pz=ps2?(ps2.status==='gone'?'Gone':ps2.dim1&&ps2.dim2?ps2.dim1+'x'+ps2.dim2:''):'';
          h+='<td style="padding:2px 3px;text-align:center"><span style="font-size:7.5px;color:#666">'+(pz||'--')+'</span> <span style="border-bottom:1px solid #999;display:inline-block;width:28px">&nbsp;</span></td>';
        });
      } else {
        var ps1=last&&last.tumor_sites&&last.tumor_sites[0]?last.tumor_sites[0]:null;
        var pz1=ps1?(ps1.status==='gone'?'Gone':ps1.dim1&&ps1.dim2?ps1.dim1+'x'+ps1.dim2:''):'';
        h+='<td style="padding:2px 3px;text-align:center"><span style="font-size:7.5px;color:#666">'+(pz1||'--')+'</span> <span style="border-bottom:1px solid #999;display:inline-block;width:28px">&nbsp;</span></td>';
      }
      h+='<td style="padding:2px 3px;text-align:center"><span style="display:block;font-size:7.5px;color:#666;line-height:1.2">'+(m.weight?m.weight+'g':'&nbsp;')+'</span><span style="border-bottom:1px solid #999;display:inline-block;width:32px">&nbsp;</span></td>'
        +'<td style="padding:2px 3px"><span style="border-bottom:.5px solid #ccc;display:inline-block;width:100%;min-width:50px">&nbsp;</span></td>'
        +'</tr>';
    });
    h+='</tbody></table>';
    return h;
  }

  Object.keys(ptByExp).sort().forEach(function(eid){
    var exp=S.experiments.find(function(e){return e.id===eid});
    var expTasks=ptByExp[eid];
    if(!expTasks.length)return;

    // WP header
    phtml+='<div style="margin-bottom:8px;page-break-inside:avoid">';
    phtml+='<div style="font-size:10px;font-weight:700;padding:2px 0;border-bottom:1.5px solid #000;margin-bottom:3px;display:flex;justify-content:space-between">'
      +'<span>'+eid+' — '+(exp?exp.name:'')+'</span>'
      +'<span style="font-size:8px;font-weight:400;color:#555">'+(exp&&exp.harvest?'Harvest: '+exp.harvest:'')+'</span>'
      +'</div>';

    // Group tasks by cage
    var ptByCage={};
    var ptNoCage=[];
    expTasks.forEach(function(t){
      if(t.m&&t.m.cage_number){
        var c=t.m.cage_number;if(!ptByCage[c])ptByCage[c]=[];ptByCage[c].push(t);
      } else {
        ptNoCage.push(t);
      }
    });

    // Per cage
    Object.keys(ptByCage).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})}).forEach(function(cage){
      var cageTasks=ptByCage[cage];
      // Merge tasks per mouse
      var cageMouseMap={};
      cageTasks.forEach(function(t){if(!cageMouseMap[t.mouseId])cageMouseMap[t.mouseId]=[];cageMouseMap[t.mouseId].push(t);});
      var cageMice=Object.keys(cageMouseMap).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})})
        .map(function(mid){return (S.mice[eid]||[]).find(function(m){return m.id===mid;})}).filter(Boolean);
      var siteLocs=getSiteLocs(cageMice,eid);

      // Cage sub-header
      phtml+='<div style="font-size:8.5px;font-weight:600;background:#eee;padding:1px 4px;margin-bottom:1px">Cage '+cage+'</div>';
      phtml+=printMiceTable(cageMice,cageMouseMap,eid,siteLocs);
    });

    // No cage section
    if(ptNoCage.length){
      var ncMouseMap={};
      ptNoCage.forEach(function(t){if(!ncMouseMap[t.mouseId])ncMouseMap[t.mouseId]=[];ncMouseMap[t.mouseId].push(t);});
      var ncMice=Object.keys(ncMouseMap).sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})})
        .map(function(mid){return (S.mice[eid]||[]).find(function(m){return m.id===mid;})}).filter(Boolean);
      var ncSiteLocs=getSiteLocs(ncMice,eid);
      phtml+='<div style="font-size:8.5px;font-weight:600;background:#eee;padding:1px 4px;margin-bottom:1px;color:#666">No cage assigned</div>';
      phtml+=printMiceTable(ncMice,ncMouseMap,eid,ncSiteLocs);
    }

    phtml+='</div>';
  });

  // Mixed cages section
  var ptMixedTasks=todayTasks.filter(function(t){return t.m&&t.m.cage_number&&ptMixedCages.has(t.m.cage_number);});
  if(ptMixedTasks.length){
    phtml+='<div style="margin-bottom:8px;page-break-inside:avoid">';
    phtml+='<div style="font-size:10px;font-weight:700;padding:2px 0;border-bottom:1.5px solid #000;margin-bottom:3px">Mixed cages</div>';
    var ptMixByCage={};
    ptMixedTasks.forEach(function(t){var c=t.m.cage_number;if(!ptMixByCage[c])ptMixByCage[c]=[];ptMixByCage[c].push(t);});
    Object.keys(ptMixByCage).sort().forEach(function(cage){
      var cTasks=ptMixByCage[cage];
      var wps=[...new Set(cTasks.map(function(t){return t.expId}))].join(', ');
      var mMap={};cTasks.forEach(function(t){if(!mMap[t.mouseId])mMap[t.mouseId]=[];mMap[t.mouseId].push(t);});
      var mMice=Object.keys(mMap).sort().map(function(mid){
        var expId=mMap[mid][0].expId;
        return (S.mice[expId]||[]).find(function(m){return m.id===mid;});
      }).filter(Boolean);
      var mSiteLocs=[];
      mMice.forEach(function(m){var last=lastMs(m.id,mMap[m.id]&&mMap[m.id][0]?mMap[m.id][0].expId:'');if(last&&last.tumor_sites)last.tumor_sites.forEach(function(s){if(s.location&&!mSiteLocs.includes(s.location))mSiteLocs.push(s.location);});});
      phtml+='<div style="font-size:8.5px;font-weight:600;background:#eee;padding:1px 4px;margin-bottom:1px">Cage '+cage+' <span style="font-weight:400;color:#666">('+wps+')</span></div>';
      phtml+=printMiceTable(mMice,mMap,mMap[Object.keys(mMap)[0]][0].expId,mSiteLocs);
    });
    phtml+='</div>';
  }

  // Post-Mx distress sections
  S.experiments.filter(function(e){return e.status==='active'&&e.is_mastectomy;}).forEach(function(exp){
    var postMxMice=(S.mice[exp.id]||[]).filter(function(m){return m.status==='active'&&m.post_mx_status==='post_mx';});
    if(!postMxMice.length)return;
    postMxMice.sort(function(a,b){return(a.cage_number||'').localeCompare(b.cage_number||'',undefined,{numeric:true});});
    phtml+='<div style="margin-bottom:8px;page-break-inside:avoid">';
    phtml+='<div style="font-size:10px;font-weight:700;padding:2px 0;border-bottom:1.5px solid #854F0B;margin-bottom:3px;color:#854F0B">'+exp.id+' — Post-Mx distress monitoring</div>';
    phtml+='<table style="width:100%;border-collapse:collapse;font-size:8.5px">';
    phtml+='<thead><tr style="border-bottom:1px solid #000">'
      +'<th style="padding:1px 3px;width:55px">Mouse</th>'
      +'<th style="padding:1px 3px;width:30px">Cage</th>'
      +'<th style="padding:1px 3px;width:55px">Group</th>'
      +'<th style="padding:1px 3px;width:30px">d-post-Mx</th>'
      +'<th style="padding:1px 3px">Recent notes</th>'
      +'<th style="padding:1px 3px;width:70px">Today</th>'
      +'</tr></thead><tbody>';
    postMxMice.forEach(function(m,mi){
      var mevts=(S.mevents[exp.id]||{})[m.id]||[];
      var lastChecks=mevts.filter(function(e){return e.event_type==='distress_check';}).slice(-3);
      var notesStr=lastChecks.map(function(c){return c.event_date.slice(5)+': '+(c.details&&c.details.note?c.details.note:c.label.replace('Distress check: ',''));}).join(' | ');
      var daysMx=m.mx_date?Math.round((new Date(TISO)-new Date(m.mx_date))/86400000):null;
      phtml+='<tr style="border-bottom:.5px solid #ddd;background:'+(mi%2===0?'#fff':'#f5f5f5')+'">'
        +'<td style="padding:2px 3px;font-family:monospace;font-size:8px">'+m.id+'</td>'
        +'<td style="padding:2px 3px">'+(m.cage_number||'')+'</td>'
        +'<td style="padding:2px 3px;font-size:7.5px">'+(m.group_name||'')+'</td>'
        +'<td style="padding:2px 3px">'+(daysMx!=null?'d'+daysMx:'')+'</td>'
        +'<td style="padding:2px 3px;font-size:8px;color:#444">'+(notesStr||'—')+'</td>'
        +'<td style="padding:2px 3px"><span style="border-bottom:1px solid #999;display:inline-block;width:100%">&nbsp;</span></td>'
        +'</tr>';
    });
    phtml+='</tbody></table></div>';
  });

  // If nothing was added, show a message
  if(phtml.length < 200){
    phtml+='<div style="padding:2rem;text-align:center;color:#666;font-size:11px">No tasks scheduled for '+(S.dailyDate||TISO)+'</div>';
  }
  return phtml;
}

function doPrint(){
  var html=buildPrintHTML();
  var frame=document.getElementById('print-frame');
  if(!frame){
    frame=document.createElement('iframe');
    frame.id='print-frame';
    frame.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none';
    document.body.appendChild(frame);
  }
  var doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();
  doc.write('<!DOCTYPE html><html><head><meta charset="utf-8">'
    +'<title>Daily sheet</title>'
    +'<style>'
    +'@page{size:A4 portrait;margin:8mm}'
    +'body{font-family:Arial,Helvetica,sans-serif;font-size:9px;margin:0;padding:0}'
    +'table{width:100%;border-collapse:collapse}'
    +'th,td{padding:2px 3px}'
    +'tr{page-break-inside:avoid}'
    +'</style>'
    +'</head><body>'
    +html
    +'</body></html>');
  doc.close();
  frame.onload=function(){frame.contentWindow.focus();frame.contentWindow.print();};
}

function buildExpNav(){
  document.getElementById('exp-nav').innerHTML=S.experiments.filter(function(e){return e.status==='active'}).map(function(e){
    return'<div class="nav-exp" onclick="go(\'exp-'+e.id+'\')" style="flex-direction:column;align-items:flex-start;padding:4px 1rem 4px 1.5rem">'
      +'<div style="display:flex;align-items:center;gap:5px;width:100%">'
      +'<div class="edot" style="background:'+e.color+'"></div>'
      +'<span style="font-size:11px;font-weight:500">'+e.id+'</span>'
      +'</div>'
      +'<div style="font-size:9px;color:var(--text3);padding-left:12px;line-height:1.3">'+(e.name.length>22?e.name.slice(0,22)+'…':e.name)+'</div>'
      +'<div style="font-size:9px;color:var(--text3);padding-left:12px">'+e.researcher+'</div>'
      +'</div>';
  }).join('');
}
function go(view){
  S.view=view;S.curExp=null;S.expTab='mice';
  if(typeof clearSelection==='function')clearSelection();
  ['daily','week','exps','new'].forEach(function(n){var el=document.getElementById('nav-'+n);if(el)el.classList.toggle('act',n===view);});
  if(view==='daily'){S.dailyDate=TISO;renderDaily();}
  else if(view==='week')renderWeek();
  else if(view==='exps')renderExps();
  else if(view==='new')renderNew();
  else if(view.indexOf('exp-')===0){
    ['daily','week','exps','new'].forEach(function(n){var el=document.getElementById('nav-'+n);if(el)el.classList.remove('act');});
    S.curExp=view.replace('exp-','');renderExp(S.curExp);
  }
}

// Wire log form buttons and keyboard navigation
function ilWireButtons(eid,mid,ei){
  var _ei=ei===undefined?-1:ei;
  var b=document.getElementById('il-save-'+mid);
  if(b)b.onclick=function(e){e.stopPropagation();submitLog(eid,mid,_ei);};
  var b2=document.getElementById('il-savekdv-'+mid);
  if(b2)b2.onclick=function(e){e.stopPropagation();saveKDV(eid,mid);};
  var b3=document.getElementById('il-addsite-'+mid);
  if(b3)b3.onclick=function(e){e.stopPropagation();addBlankSite(mid);};
  // Keyboard navigation: Tab moves between fields (native, via tabindex already set on inputs).
  // Enter always saves immediately, regardless of which field has focus.
  var ilEl=document.getElementById('il-'+mid);
  if(!ilEl)return;
  var _mid=mid;
  ilEl.addEventListener('keydown',function(e){
    if(e.key!=='Enter')return;
    var t=e.target;
    if(!t||t.tagName==='SELECT'||t.tagName==='BUTTON')return;
    e.preventDefault();
    submitLog(eid,_mid,_ei);
  });
}

// RESCHEDULE ALL TASKS IN A DAY
function showReschedAll(){
  S._rsMap=S._rsMap||[];
  var viewDate=S.dailyDate||TISO;
  var tasks=getTasksForDate(viewDate).filter(function(t){return t.type!=='custom'&&t.type!=='distress'});
  if(!tasks.length){alert('No tasks to reschedule today.');return;}
  var checkboxes=tasks.map(function(t,i){
    var rsIdx=rsReg({date:t.date,label:t.label||'',type:t.type,mouseId:t.mouseId||'',expId:t.expId||''});
    return '<label style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px">'
      +'<input type="checkbox" class="rsall-chk" value="'+rsIdx+'" checked>'
      +'<span class="mono" style="min-width:80px">'+(t.mouseId||'--')+'</span>'
      +'<span style="color:var(--text2);min-width:65px">'+(t.expId||'')+'</span>'
      +'<span>'+(t.label||t.type)+'</span>'
      +'</label>';
  }).join('');
  showModal('Reschedule tasks — today',
    '<div style="font-size:10px;color:var(--text2);margin-bottom:8px">Select tasks to reschedule. All selected tasks will move to the same new date.</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:8px">'
    +'<button class="btn btn-xs" onclick="document.querySelectorAll(\'.rsall-chk\').forEach(function(c){c.checked=true})">Select all</button>'
    +'<button class="btn btn-xs" onclick="document.querySelectorAll(\'.rsall-chk\').forEach(function(c){c.checked=false})">Deselect all</button>'
    +'</div>'
    +'<div style="max-height:240px;overflow-y:auto;border:.5px solid var(--border);border-radius:var(--r);padding:6px 8px;margin-bottom:8px">'+checkboxes+'</div>'
    +'<div class="f2">'
    +'<div class="fg"><label class="fl">Reschedule to</label><input class="fi" id="rsall-date" type="date" value="'+addD(S.dailyDate||TISO,1)+'"></div>'
    +'<div class="fg"><label class="fl">Reason</label><input class="fi" id="rsall-reason" placeholder="e.g. animal facility closed"></div>'
    +'</div>',
    '<button class="btn btn-xs" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-p btn-xs" onclick="submitReschedAll()"><i class="ti ti-calendar-event"></i> Reschedule selected</button>');
}
async function submitReschedAll(){
  var nd=document.getElementById('rsall-date')&&document.getElementById('rsall-date').value;
  var reason=document.getElementById('rsall-reason')&&document.getElementById('rsall-reason').value||'';
  if(!nd){alert('Pick a date');return;}
  var checked=document.querySelectorAll('.rsall-chk:checked');
  if(!checked.length){alert('Select at least one task');return;}
  var promises=[];
  checked.forEach(function(c){
    var idx=parseInt(c.value);
    var task=S._rsMap[idx];
    if(!task)return;
    promises.push(
      sb.from('adhoc_tasks').insert({
        task_date:nd,type:task.type,description:task.label,
        mouse_id:task.mouseId||null,experiment_id:task.expId||null,
        note:'Rescheduled from '+task.date+(reason?' — '+reason:''),
        original_task_key:task.label&&task.mouseId?task.label+'-'+task.mouseId:null,done:false
      })
    );
    if(task.expId){
      promises.push(
        sb.from('deviation_log').insert({
          experiment_id:task.expId,mouse_id:task.mouseId||null,
          event_type:task.type,original_date:task.date,actual_date:nd,reason:reason
        })
      );
    }
  });
  await Promise.all(promises);
  closeModal();await dbLoad();renderDaily();
}

// SORT MOUSE ID in experiment view
S.mouseSort='default'; // 'default' | 'id-asc' | 'id-desc'
function cycleSortMice(eid){
  if(S.mouseSort==='default')S.mouseSort='id-asc';
  else if(S.mouseSort==='id-asc')S.mouseSort='id-desc';
  else if(S.mouseSort==='id-desc')S.mouseSort='cage-asc';
  else if(S.mouseSort==='cage-asc')S.mouseSort='cage-desc';
  else S.mouseSort='default';
  renderExp(eid);
}
function sortMiceForDisplay(mice){
  if(S.mouseSort==='id-asc')return mice.slice().sort(function(a,b){return a.id.localeCompare(b.id,undefined,{numeric:true})});
  if(S.mouseSort==='id-desc')return mice.slice().sort(function(a,b){return b.id.localeCompare(a.id,undefined,{numeric:true})});
  if(S.mouseSort==='cage-asc')return mice.slice().sort(function(a,b){return(a.cage_number||'zzz').localeCompare(b.cage_number||'zzz',undefined,{numeric:true})});
  if(S.mouseSort==='cage-desc')return mice.slice().sort(function(a,b){return(b.cage_number||'').localeCompare(a.cage_number||'',undefined,{numeric:true})});
  return mice;
}

// MULTI-SELECT + FLOATING ACTION BAR
S._selectedMice={}; // {mid: eid}

function onRowCheck(chk){
  var mid=chk.dataset.mid,eid=chk.dataset.eid;
  if(chk.checked){S._selectedMice[mid]=eid;}
  else{delete S._selectedMice[mid];}
  updateFloatBar(eid);
}

function toggleSelectGroup(headerChk,gid){
  var checked=headerChk.checked;
  document.querySelectorAll('.row-chk').forEach(function(chk){
    var m=(S.mice[chk.dataset.eid]||[]).find(function(x){return x.id===chk.dataset.mid});
    if(m&&(m.group_id===gid||m.group_name===gid)){
      chk.checked=checked;
      if(checked){S._selectedMice[chk.dataset.mid]=chk.dataset.eid;}
      else{delete S._selectedMice[chk.dataset.mid];}
    }
  });
  var eids=Object.values(S._selectedMice);
  if(eids.length)updateFloatBar(eids[0]);
  else{document.getElementById('float-bar').style.display='none';}
}

function clearSelection(){
  S._selectedMice={};
  document.querySelectorAll('.row-chk').forEach(function(c){c.checked=false;});
  document.getElementById('float-bar').style.display='none';
}

function updateFloatBar(eid){
  var count=Object.keys(S._selectedMice).length;
  var bar=document.getElementById('float-bar');
  var countEl=document.getElementById('float-count');
  if(!count){bar.style.display='none';return;}
  bar.style.display='flex';
  if(countEl)countEl.textContent=count+' mouse'+(count>1?'es':'')+ ' selected';
  // Populate group dropdown
  var sel=document.getElementById('float-group-sel');
  if(sel&&eid){
    var groups=S.groups[eid]||[];
    sel.innerHTML=groups.map(function(g){return'<option value="'+g.id+'|'+g.name+'">'+g.name+'</option>';}).join('');
  }
}

async function bulkMoveGroup(){
  var mids=Object.keys(S._selectedMice);
  if(!mids.length)return;
  var eid=Object.values(S._selectedMice)[0];
  var gv=document.getElementById('float-group-sel')&&document.getElementById('float-group-sel').value||'';
  if(!gv){alert('Select a group');return;}
  var parts=gv.split('|'),ngid=parts[0],ngname=parts[1];
  if(!confirm('Move '+mids.length+' mice to '+ngname+'?'))return;
  var errors=[];
  for(var i=0;i<mids.length;i++){
    var mid=mids[i];
    var m=(S.mice[eid]||[]).find(function(x){return x.id===mid});
    if(!m){continue;}
    var r=await sb.from('mice').update({group_id:ngid,group_name:ngname}).eq('id',mid);
    if(r.error){errors.push(mid);continue;}
    await sb.from('mouse_events').insert({
      mouse_id:mid,experiment_id:eid,event_date:TISO,
      event_type:'transferred',
      label:'Bulk moved by '+uname()+': '+m.group_name+' to '+ngname,
      details:{from_group:m.group_name,to_group:ngname,bulk:true,moved_with:mids},
      logged_by:uname()
    });
  }
  if(errors.length)alert('Could not move: '+errors.join(', '));
  clearSelection();await loadAll(eid);renderExp(eid);
}

async function bulkAddNote(){
  var mids=Object.keys(S._selectedMice);
  if(!mids.length)return;
  var eid=Object.values(S._selectedMice)[0];
  var note=document.getElementById('float-note-in')&&document.getElementById('float-note-in').value||'';
  if(!note.trim()){alert('Enter a note');return;}
  var evts=mids.map(function(mid){
    return{mouse_id:mid,experiment_id:eid,event_date:TISO,event_type:'note',label:note.trim(),logged_by:uname()};
  });
  await sb.from('mouse_events').insert(evts);
  document.getElementById('float-note-in').value='';
  alert('Note added to '+mids.length+' mice');
  clearSelection();await loadAll(eid);renderExp(eid);
}

// BOOT
// Tooltip positioning
document.addEventListener('mouseover',function(e){
  var wrap=e.target.closest&&e.target.closest('.hv-wrap');
  if(!wrap)return;
  var tip=wrap.querySelector('.hv-tip');if(!tip)return;
  tip.style.display='block';
  var r=wrap.getBoundingClientRect();
  var tx=r.right+8,ty=r.top-4;
  if(tx+310>window.innerWidth)tx=r.left-318;
  if(ty+80>window.innerHeight)ty=window.innerHeight-90;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
});
document.addEventListener('mouseout',function(e){
  var wrap=e.target.closest&&e.target.closest('.hv-wrap');
  if(!wrap)return;
  var tip=wrap.querySelector('.hv-tip');if(tip)tip.style.display='none';
});
